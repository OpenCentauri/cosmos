# swupdate install-time verification posture for cosmos.
# Build-time signing posture lives in
# meta-opencentauri/images/opencentauri-upgrade.bb behind the
# SWUPDATE_ENABLE_SIGNING flag (default off). The two are independent:
# fragment.cfg controls what the device verifies; opencentauri-upgrade.bb
# controls whether the produced SWU carries an RSA signature at all.
#
# CONFIG_HASH_VERIFY=y: device verifies each image artifact's sha256
# against sw-description before flashing.
#
# CONFIG_SIGNED_IMAGES OFF: device does NOT verify sw-description's RSA
# signature. This is intentional: it keeps the install path open for
# unsigned SWU artifacts (USB emergency.swu, local rebuilds, recovery
# flows). The hash chain still rejects bit-rot and truncated transfers;
# only signature-based provenance is opt-out.
#
# To enable signature verification on a hardened image: set
# CONFIG_SIGNED_IMAGES=y and CONFIG_SIGALG_RAWRSA=y (or CMS), ship
# swupdate_public.pem (already present in this directory), and set
# SWUPDATE_ENABLE_SIGNING="1" in local.conf so the corresponding build-
# time recipe also signs the produced SWU.
CONFIG_BOOTLOADERHANDLER=y
CONFIG_HASH_VERIFY=y
# CONFIG_SIGNED_IMAGES is not set
# CONFIG_SIGALG_RAWRSA is not set
# CONFIG_HW_COMPATIBILITY is not set
CONFIG_AWBOOT_HANDLER=y
