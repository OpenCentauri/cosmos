# Writeback tuning for the 128 MB-RAM Allwinner R528 stock board.
# Default kernel dirty_ratio is 20% and dirty_background_ratio is 10% of
# RAM, which on 128 MB holds ~25.6 MB in writeback before flush. Long
# prints generate steady eMMC writes (klippy.log, moonraker telemetry,
# gcode metadata cache); deferred flushes mean larger burst writes and
# longer eMMC wear amplification.
#
# Smaller dirty buffer means more frequent small writes (CPU-cheap)
# instead of fewer large writes that the eMMC FTL has to wear-amplify
# across many pages. The writeback values pull data out of dirty state
# faster (200 cs = 2 seconds polling, 500 cs = 5 seconds before a dirty
# page must start being written back).

vm.dirty_ratio = 5
vm.dirty_background_ratio = 2
vm.dirty_expire_centisecs = 500
vm.dirty_writeback_centisecs = 200

# Note: /proc/sys/vm/swappiness is set to 150 by the zram init script
# when zram is active. Do not set swappiness from this file because that
# would race with the zram init script's intent.
