# Runtime-memory profile for the 128 MiB Centauri Carbon 1.
#
# Keep this as the final machine fragment so generic arm/defconfig settings do
# not re-enable facilities that are not part of the appliance contract.

# Release diagnostics and runtime instrumentation.  Developers should use a
# separate debug kernel rather than carrying these tables in every printer.
# Linux 6.6 only exposes KALLSYMS when EXPERT is enabled.  EXPERT selects the
# DEBUG_KERNEL menu, but not its instrumentation: retain the menu symbol so
# that the material KALLSYMS tables can be removed and explicitly keep its
# debug features off below.
CONFIG_EXPERT=y
CONFIG_DEBUG_KERNEL=y
# CONFIG_DEBUG_MISC is not set
# CONFIG_DEBUG_BUGVERBOSE is not set
# CONFIG_SLUB_DEBUG is not set
# CONFIG_IKCONFIG is not set
# CONFIG_IKCONFIG_PROC is not set
# CONFIG_KALLSYMS is not set
# CONFIG_FTRACE is not set
# CONFIG_EVENT_TRACING is not set
# CONFIG_TRACING is not set
# CONFIG_UPROBES is not set
# CONFIG_UPROBE_EVENTS is not set
# CONFIG_PERF_EVENTS is not set
# CONFIG_TASKSTATS is not set
# CONFIG_TASK_DELAY_ACCT is not set
# CONFIG_TASK_XACCT is not set
# CONFIG_TASK_IO_ACCOUNTING is not set
# CONFIG_SCHED_INFO is not set

# No containers, sandboxing, or general-purpose asynchronous I/O are used on
# the appliance image.
# SCHED_AUTOGROUP selects the otherwise unused cgroup scheduler hierarchy.
# CONFIG_SCHED_AUTOGROUP is not set
# CONFIG_CGROUPS is not set
# CONFIG_CGROUP_SCHED is not set
# CONFIG_CGROUP_NET_CLASSID is not set
# CONFIG_FAIR_GROUP_SCHED is not set
# Basic networking selects the small core BPF interpreter in Linux 6.6.  The
# syscall and JIT remain disabled by kernel-size-reduction.cfg.
# CONFIG_IO_URING is not set
# CONFIG_FANOTIFY is not set
# CONFIG_HIGHMEM is not set
# CONFIG_POSIX_MQUEUE is not set
# CONFIG_SYSVIPC is not set
# CONFIG_SECCOMP is not set
# CONFIG_SECCOMP_FILTER is not set

# The appliance networking contract is IPv4 TCP/UDP over Ethernet or Wi-Fi;
# it has no firewall, bridge, VLAN, or IPv6 requirement.
# CONFIG_IPV6 is not set
# CONFIG_NETFILTER is not set
# CONFIG_NETFILTER_ADVANCED is not set
# CONFIG_NF_CONNTRACK is not set
# CONFIG_BRIDGE is not set
# CONFIG_VLAN_8021Q is not set

# The CC1 is a D1/T113 board.  Generic arm/defconfig enables several older
# Allwinner pinctrl/PWM/I2C drivers that can never bind to this device tree.
# CONFIG_PINCTRL_SUN4I_A10 is not set
# CONFIG_PINCTRL_SUN5I is not set
# CONFIG_PINCTRL_SUN6I_A31 is not set
# CONFIG_PINCTRL_SUN6I_A31_R is not set
# CONFIG_PINCTRL_SUN8I_A23 is not set
# CONFIG_PINCTRL_SUN8I_A23_R is not set
# CONFIG_PINCTRL_SUN8I_A33 is not set
# CONFIG_PINCTRL_SUN8I_A83T is not set
# CONFIG_PINCTRL_SUN8I_A83T_R is not set
# CONFIG_PINCTRL_SUN8I_H3 is not set
# CONFIG_PINCTRL_SUN8I_H3_R is not set
# CONFIG_PINCTRL_SUN9I_A80 is not set
# CONFIG_PINCTRL_SUN9I_A80_R is not set
# CONFIG_PWM_SUN4I is not set

# Explicitly retain the printer's diagnostics and hardware interfaces.
CONFIG_DEVMEM=y
CONFIG_GPIOLIB=y
CONFIG_GPIO_SYSFS=y
CONFIG_GPIO_CDEV=y
CONFIG_GPIO_CDEV_V1=y
CONFIG_I2C_CHARDEV=y
# The D1/T113 device tree uses an A31-compatible I2C node.  Linux binds that
# node through this legacy-named driver and exposes the printer's /dev/i2c-2.
CONFIG_I2C_MV64XXX=y
CONFIG_SPI_SPIDEV=y
CONFIG_USB_STORAGE=y
CONFIG_MEDIA_SUPPORT=m
CONFIG_USB_VIDEO_CLASS=m
CONFIG_DRM=y
CONFIG_DRM_FBDEV_EMULATION=y
CONFIG_RPMSG=y
CONFIG_RPMSG_TTY=m
CONFIG_REMOTEPROC=y
CONFIG_SUNXI_R528_HIFI4_REMOTEPROC=m
CONFIG_SWAP=y
CONFIG_ZRAM=m
