# ============================================================
# Compression & boot
# ============================================================
CONFIG_KERNEL_XZ=y
CONFIG_BLK_DEV_INITRD=y
# --- Only gzip decompressor for initramfs ---
# CONFIG_RD_BZIP2 is not set
# CONFIG_RD_LZMA is not set
# CONFIG_RD_XZ is not set
# CONFIG_RD_LZO is not set
# CONFIG_RD_LZ4 is not set
# CONFIG_RD_ZSTD is not set


# ============================================================
# CPU / SMP — T113 is dual-core
# ============================================================
CONFIG_NR_CPUS=2
CONFIG_CPU_FREQ=y
CONFIG_CPUFREQ_DT=y
CONFIG_CPU_FREQ_GOV_ONDEMAND=y
# CONFIG_CPU_FREQ_GOV_POWERSAVE is not set
# CONFIG_CPU_FREQ_GOV_USERSPACE is not set
# CONFIG_CPU_FREQ_GOV_CONSERVATIVE is not set
# CONFIG_CPU_FREQ_STAT_DETAILS is not set
CONFIG_CPU_IDLE=y
CONFIG_ARM_CPUIDLE=y


# ============================================================
# Memory architecture — HIGHMEM is pointless on 128 MB
# ============================================================
# CONFIG_HIGHMEM is not set
# CONFIG_HIGHPTE is not set


# ============================================================
# Process / scheduler overhead — not needed on embedded
# ============================================================
# CONFIG_CGROUPS is not set
# CONFIG_BSD_PROCESS_ACCT is not set
# CONFIG_BSD_PROCESS_ACCT_V3 is not set
# CONFIG_TASKSTATS is not set
# CONFIG_TASK_DELAY_ACCT is not set
# CONFIG_TASK_XACCT is not set
# CONFIG_TASK_IO_ACCOUNTING is not set
# CONFIG_SCHED_AUTOGROUP is not set
# CONFIG_POSIX_MQUEUE is not set


# ============================================================
# Debug / profiling — save RAM
# ============================================================
# CONFIG_PERF_EVENTS is not set
# CONFIG_IKCONFIG is not set
# CONFIG_IKCONFIG_PROC is not set
# CONFIG_BPF_SYSCALL is not set
# CONFIG_BPF_JIT is not set
# CONFIG_DEBUG_FS is not set
# CONFIG_DYNAMIC_DEBUG is not set
# CONFIG_PRINTK_TIME is not set


# ============================================================
# Modules
# ============================================================
CONFIG_MODULES=y
CONFIG_MODULE_UNLOAD=y


# ============================================================
# Hibernation — no suspend-to-disk on embedded
# ============================================================
# CONFIG_HIBERNATION is not set


