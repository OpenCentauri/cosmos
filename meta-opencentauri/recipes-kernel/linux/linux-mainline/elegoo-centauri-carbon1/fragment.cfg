# CONFIG_MAC_PARTITION is not set
# CONFIG_LDM_PARTITION is not set


# ============================================================
# Filesystems
# ============================================================

# --- SquashFS (read-only rootfs, LZ4 only) ---
CONFIG_SQUASHFS=y
# CONFIG_SQUASHFS_ZLIB is not set
# CONFIG_SQUASHFS_XZ is not set
# CONFIG_SQUASHFS_LZO is not set
# CONFIG_SQUASHFS_ZSTD is not set
CONFIG_SQUASHFS_LZ4=y
CONFIG_SQUASHFS_EMBEDDED=y

# --- OverlayFS (writable layer) ---
CONFIG_OVERLAY_FS=y

# --- ext4 + VFAT for USB drives ---
CONFIG_EXT4_FS=y
CONFIG_VFAT_FS=y
CONFIG_FAT_DEFAULT_UTF8=y
CONFIG_NLS_CODEPAGE_437=y
CONFIG_NLS_ISO8859_1=y
CONFIG_NLS_UTF8=y
CONFIG_TMPFS=y

# --- Disabled filesystems ---
# CONFIG_XFS_FS is not set
# CONFIG_BTRFS_FS is not set
# CONFIG_ISO9660_FS is not set
# CONFIG_UDF_FS is not set
# CONFIG_FSCACHE is not set
# CONFIG_CACHEFILES is not set
# CONFIG_AUTOFS4_FS is not set
# CONFIG_FUSE_FS is not set
# CONFIG_FANOTIFY is not set


# ============================================================
# Swap + zram
# ============================================================
CONFIG_SWAP=y
CONFIG_ZRAM=m
CONFIG_ZRAM_BACKEND_LZ4=y
# CONFIG_ZRAM_BACKEND_LZO is not set
CONFIG_ZRAM_DEF_COMP_LZ4=y
CONFIG_ZRAM_DEF_COMP="lz4"
CONFIG_CRYPTO_LZ4=y


# ============================================================
# Display — parallel RGB via DRM sun4i + /dev/fb0
#
# R528 display path: DE2 mixer -> TCON -> parallel RGB
# DRM_FBDEV_EMULATION provides /dev/fb0 from DRM.
# SUN4I_BACKEND is the DE1 engine — kept because some R528
# DTS variants wire through it. If your display works without
# it, disable it for ~50 KB savings.
# ============================================================
CONFIG_DRM=y
CONFIG_DRM_KMS_HELPER=y
CONFIG_DRM_GEM_DMA_HELPER=y
CONFIG_DRM_FBDEV_EMULATION=y
CONFIG_DRM_FBDEV_OVERALLOC=100

# CONFIG_DRM_SUN4I is not set

CONFIG_DRM_PANEL=y
CONFIG_DRM_PANEL_SIMPLE=y
CONFIG_DRM_BRIDGE=y
CONFIG_DRM_PANEL_BRIDGE=y
CONFIG_DRM_PANEL_ORIENTATION_QUIRKS=y

CONFIG_BACKLIGHT_CLASS_DEVICE=y
CONFIG_BACKLIGHT_PWM=y
CONFIG_BACKLIGHT_GPIO=y

CONFIG_FB=y

