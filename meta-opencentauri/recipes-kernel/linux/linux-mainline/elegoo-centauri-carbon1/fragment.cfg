# ============================================================
# Input — touchscreen + evdev, no keyboard/mouse drivers
# ============================================================
CONFIG_INPUT_EVDEV=y
CONFIG_INPUT_TOUCHSCREEN=y
CONFIG_TOUCHSCREEN_GOODIX=y
CONFIG_INPUT_KEYBOARD=y
CONFIG_INPUT_MOUSE=y
CONFIG_INPUT_MISC=y
CONFIG_INPUT_AXP20X_PEK=y


# ============================================================
# UART
# ============================================================
CONFIG_SERIAL_8250=y
CONFIG_SERIAL_8250_CONSOLE=y
CONFIG_SERIAL_8250_NR_UARTS=4
CONFIG_SERIAL_8250_RUNTIME_UARTS=4
CONFIG_SERIAL_8250_DW=y
CONFIG_SERIAL_OF_PLATFORM=y


# ============================================================
# I2C / SPI / GPIO
# ============================================================
CONFIG_I2C=y
CONFIG_I2C_CHARDEV=y
CONFIG_I2C_MV64XXX=y
CONFIG_SPI=y
CONFIG_SPI_SPIDEV=y
CONFIG_SPI_SUN6I=y
CONFIG_EXPERT=y
CONFIG_GPIO_SYSFS=y

# --- Old SoC peripherals not on T113/R528 ---
# CONFIG_I2C_SUN6I_P2WI is not set
# CONFIG_SPI_SUN4I is not set


# ============================================================
# USB
# ============================================================
CONFIG_USB=y
CONFIG_USB_EHCI_HCD=y
CONFIG_USB_EHCI_HCD_PLATFORM=y
CONFIG_USB_OHCI_HCD=y
CONFIG_USB_OHCI_HCD_PLATFORM=y
CONFIG_USB_STORAGE=y
CONFIG_USB_ACM=y

# --- USB serial: CP210X, FTDI, PL2303, CH341 ---
CONFIG_USB_SERIAL=m
CONFIG_USB_SERIAL_GENERIC=y
CONFIG_USB_SERIAL_SIMPLE=m
CONFIG_USB_SERIAL_CP210X=m
CONFIG_USB_SERIAL_FTDI_SIO=m
CONFIG_USB_SERIAL_PL2303=m
CONFIG_USB_SERIAL_CH341=m
# CONFIG_USB_SERIAL_KEYSPAN is not set
# CONFIG_USB_SERIAL_KLSI is not set
# CONFIG_USB_SERIAL_MOS7720 is not set
# CONFIG_USB_SERIAL_MOS7840 is not set

# --- USB PHY ---
CONFIG_PHY_SUN4I_USB=y
# CONFIG_PHY_SUN9I_USB is not set


# ============================================================
# Power / thermal / watchdog
# ============================================================
CONFIG_POWER_SUPPLY=y
CONFIG_POWER_RESET=y
CONFIG_WATCHDOG=y
CONFIG_SUNXI_WATCHDOG=y
CONFIG_MFD_AXP20X=y
CONFIG_REGULATOR=y
CONFIG_REGULATOR_FIXED_VOLTAGE=y
CONFIG_REGULATOR_AXP20X=y
CONFIG_REGULATOR_GPIO=y

# --- Thermal (R528/T113-S3 sensor block) ---
# Trip points: 85°C passive (monitoring-only), 100°C critical
# CPU_THERMAL intentionally disabled — no cooling-maps in DTS,
# enabling it would risk breaking Klipper stepper timing.
CONFIG_THERMAL=y
CONFIG_THERMAL_OF=y
CONFIG_THERMAL_GOV_STEP_WISE=y
CONFIG_THERMAL_HWMON=y
CONFIG_SUN8I_THERMAL=y
# CONFIG_CPU_THERMAL is not set
CONFIG_NVMEM_SUNXI_SID=y


# ============================================================
# LEDs — GPIO + regulator only
# ============================================================
CONFIG_LEDS_CLASS=y
CONFIG_LEDS_GPIO=y
CONFIG_LEDS_REGULATOR=y
CONFIG_LEDS_TRIGGER_TIMER=y
CONFIG_LEDS_TRIGGER_ONESHOT=y
CONFIG_LEDS_TRIGGER_HEARTBEAT=y
CONFIG_LEDS_TRIGGER_DEFAULT_ON=y
# CONFIG_LEDS_CLASS_FLASH is not set
# CONFIG_LEDS_LM3530 is not set
# CONFIG_LEDS_LP3944 is not set
# CONFIG_LEDS_LP5521 is not set
# CONFIG_LEDS_LP5523 is not set
# CONFIG_LEDS_LP5562 is not set
# CONFIG_LEDS_LP8501 is not set
# CONFIG_LEDS_PCA955X is not set
# CONFIG_LEDS_PCA963X is not set
# CONFIG_LEDS_DAC124S085 is not set
# CONFIG_LEDS_BD2802 is not set
# CONFIG_LEDS_LT3593 is not set
# CONFIG_LEDS_TCA6507 is not set
# CONFIG_LEDS_LM355x is not set
# CONFIG_LEDS_BLINKM is not set
# CONFIG_LEDS_TRIGGER_BACKLIGHT is not set
# CONFIG_LEDS_TRIGGER_CPU is not set
# CONFIG_LEDS_TRIGGER_TRANSIENT is not set
# CONFIG_LEDS_TRIGGER_CAMERA is not set


# ============================================================
# DSP — remoteproc / rpmsg for HiFi4
# ============================================================
CONFIG_REMOTEPROC=y
CONFIG_REMOTEPROC_CDEV=y
CONFIG_SUNXI_R528_HIFI4_REMOTEPROC=m
CONFIG_RPMSG=y
CONFIG_RPMSG_CHAR=y
CONFIG_RPMSG_CTRL=y
CONFIG_RPMSG_TTY=m
CONFIG_RPMSG_NS=y
CONFIG_RPMSG_VIRTIO=y
CONFIG_VIRTIO=y
CONFIG_BLK_MQ_VIRTIO=y
CONFIG_VIRTIO_ANCHOR=y
CONFIG_MAILBOX=y
CONFIG_SUNXI_R528_MSGBOX=y


# ============================================================
# Misc hardware
# ============================================================
CONFIG_MMC=y
CONFIG_MMC_SUNXI=y
CONFIG_DMADEVICES=y
CONFIG_DMA_SUN6I=y
CONFIG_RTC_CLASS=y
# CONFIG_RTC_INTF_SYSFS is not set
# CONFIG_RTC_INTF_PROC is not set
CONFIG_RTC_DRV_SUN6I=y
CONFIG_RTC_DRV_SUNXI=y
CONFIG_EXTCON=y
CONFIG_PWM=y
CONFIG_PWM_SUN4I=y
CONFIG_DEVTMPFS=y
CONFIG_DEVTMPFS_MOUNT=y
# CONFIG_IOMMU_SUPPORT is not set
# CONFIG_HW_RANDOM is not set


# ============================================================
# Crypto — sun4i-ss hardware accel only, drop ARM NEON software
# ============================================================
CONFIG_CRYPTO_DEV_SUN4I_SS=y
# CONFIG_ARM_CRYPTO is not set
# CONFIG_CRYPTO_SHA1_ARM_NEON is not set
# CONFIG_CRYPTO_SHA256_ARM is not set
# CONFIG_CRYPTO_SHA512_ARM_NEON is not set
# CONFIG_CRYPTO_AES_ARM_BS is not set


