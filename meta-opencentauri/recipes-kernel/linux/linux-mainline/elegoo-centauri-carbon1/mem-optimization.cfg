# Kernel features for 128 MB RAM pressure relief on the Allwinner R528
# stock board.
#
# KSM (Kernel Same-page Merging) periodically scans anonymous memory
# pages and merges identical ones. On a small-RAM system running
# multiple Python processes (kalico, moonraker, ustreamer) that share
# significant library and interpreter pages, KSM typically reclaims
# 5-15 MB of RAM. KSM is a runtime no-op until /sys/kernel/mm/ksm/run
# is set to 1; the userspace init that flips the bit lives in
# meta-opencentauri/recipes-core/zram or a sibling.
#
# ZSMALLOC is the preferred zram backend (already enabled in cosmos);
# this fragment ensures the dependency is explicit rather than relying
# on transitive inclusion.

CONFIG_KSM=y

# Explicit zsmallocator selection for zram + KSM page-share storage.
CONFIG_ZSMALLOC=y
CONFIG_ZSMALLOC_STAT=y

# Optional: transparent hugepages can fragment small-RAM systems; leave
# disabled. Listed here for grep-completeness of mem tuning knobs.
# CONFIG_TRANSPARENT_HUGEPAGE is not set
