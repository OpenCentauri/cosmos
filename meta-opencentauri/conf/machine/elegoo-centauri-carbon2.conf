#@TYPE: Machine
#@NAME: Elegoo Centauri Carbon 2
#@DESCRIPTION: Machine configuration for the Elegoo Centauri Carbon 2, based on the Allwinner R528 CPU

require conf/machine/include/sun8i.inc

DEFAULTTUNE = "cortexa7thf-neon-vfpv4"

KERNEL_DEVICETREE = "allwinner/elegoo-centauri-carbon2.dtb"
KERNEL_IMAGETYPE = "zImage"
UBOOT_ENTRYPOINT = "0x43000000"
SERIAL_CONSOLES = "115200;ttyS2"
SERIAL_ADDR = "0x02500800"
KERNEL_CONSOLE  = "ttyS2,115200"

UBOOT_MACHINE = ""
UBOOT_CONFIG = "usb usb-msd emmc"
UBOOT_CONFIG[emmc]    = "elegoo_centauri_carbon2_defconfig"
UBOOT_CONFIG[usb]     = "elegoo_centauri_carbon2_defconfig"
UBOOT_CONFIG[usb-msd] = "elegoo_centauri_carbon2_defconfig"
UBOOT_CONFIG_BINARY[emmc]    = "u-boot.bin"
UBOOT_CONFIG_BINARY[usb]     = "u-boot.bin"
UBOOT_CONFIG_BINARY[usb-msd] = "u-boot.bin"
UBOOT_CONFIG_FRAGMENTS[usb]  = "usb-cc2.config"
UBOOT_CONFIG_FRAGMENTS[usb-msd] = "usb-msd.config"
