require conf/distro/poky.conf

DISTRO = "cosmos"
DISTRO_NAME = "OpenCentauri Cosmos"
DISTRO_VERSION = "0.0.6"

MAINTAINER = "James Turton <james.turton@gmx.com>"

PACKAGE_CLASSES = "package_ipk"
DISTRO_FEATURES:remove = "ptest"

DISTRO_FEATURES:append = " rust"
RUST_VERSION = "1.92.0"
CARGO_VERSION = "1.92.0"

hostname:pn-base-files = "${DISTRO}"

# linux-firmware 20240909 -> 20250311 (Sep 2024 -> Mar 2025). scarthgap
# base ships 20240909; 20250311 brings 6 months of Realtek blob iteration
# that improves rtw88 driver-stack EAPOL / 4-way handshake compatibility
# with WPA2/WPA3 transition-mode APs. Wrapper recipe at
# meta-opencentauri/recipes-kernel/linux-firmware/linux-firmware_20250311.bb.
PREFERRED_VERSION_linux-firmware = "20250311"
