require conf/distro/poky.conf

DISTRO = "cosmos"
DISTRO_NAME = "OpenCentauri Cosmos"
DISTRO_VERSION = "0.0.7"

MAINTAINER = "James Turton <james.turton@gmx.com>"

PACKAGE_CLASSES = "package_ipk"
DISTRO_FEATURES:remove = "ptest"

DISTRO_FEATURES:append = " rust"

EXTRA_IMAGE_FEATURES ?= "allow-empty-password empty-root-password allow-root-login post-install-logging"

INHERIT += "buildstats"

PATCHRESOLVE = "noop"

PACKAGECONFIG:append:pn-qemu-system-native = " sdl"

hostname:pn-base-files = "${DISTRO}"

ERROR_QA:remove = "patch-status"

PREFERRED_VERSION_linux-mainline = "6.18.37"
