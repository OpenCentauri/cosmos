# BTT ViViD configuration for AFC (ArmoredTurtle), tuned for the
# Centauri Carbon. Pre-wired for the Bigtreetech ViViD multi-material
# system.
#
# Serial IDs match BTT firmware identifiers:
#   ViViD main board : /dev/serial/by-id/usb-Klipper_stm32g0b1xx_vivid-if00
#   Buffer board     : /dev/serial/by-id/usb-Klipper_stm32f042x6_buffer-if00
# If your IDs differ, run `ls /dev/serial/by-id/*` and adjust below.
#
# To enable, add to printer.cfg:
#   [include klipper-readonly/AFC/AFC.cfg]
#   [include klipper-readonly/AFC/btt-vivid.cfg]
# Including btt-vivid.cfg also pulls in AFC_Macro_Vars.cfg, which itself
# includes the AFC macro library under macros/. The recipe sed-patches
# AFC.cfg and AFC_Macro_Vars.cfg with Centauri-Carbon-tuned defaults
# (park location, disabled hardware-specific macros).

[include AFC_Macro_Vars.cfg]

#--------------------------- MCU ---------------------------#
[mcu Vivid_1]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_vivid-if00

[temperature_sensor Vivid_1]
sensor_type: temperature_mcu
sensor_mcu: Vivid_1

[mcu Vivid_1_buffer]
serial: /dev/serial/by-id/usb-Klipper_stm32f042x6_buffer-if00

[temperature_sensor Vivid_1_buffer]
sensor_type: temperature_mcu
sensor_mcu: Vivid_1_buffer

#--------------------------- Pin Aliases (BTT ViViD board) ---------------------------#
[board_pins Vivid_1]
mcu: Vivid_1
aliases:
    MSEL_STEP=PD3   , MSEL_DIR=PD2  , MSEL_EN=PB4   , MSEL_UART=PB3,
    MDRV_STEP=PB6   , MDRV_DIR=PB5  , MDRV_EN=PB8   , MDRV_UART=PB7,

    PREP1=PA0       , PREP2=PA1     , PREP3=PA2     , PREP4=PA3,
    SEL1=PD0        , SEL2=PA15     , SEL3=PD1      , SEL4=PC13,

    RGB1=PC6        , RGB2=PC7      , CONTROLLER_FAN=PA14,
    RFID0_CS=PD14   , RFID1_CS=PA8  , RFID_SPI=spi2_PB2_PB11_PB10,

    DRYL_SCL=PA9    , DRYL_SDA=PA10 , DRYR_SCL=PA7  , DRYR_SDA=PA6,
    PTC=PA4         , HEATER=PC14   , DRY_FAN=PC15

[board_pins Vivid_1_buffer]
mcu: Vivid_1_buffer
aliases:
    LOAD1=PA0       , LOAD2=PA1     , LOAD3=PA2     , LOAD4=PA3,
    TRAIL=PA4       , ADV=PA5

#--------------------------- AFC Unit ---------------------------#
[AFC_vivid Vivid_1]
hub: Vivid_1
extruder: extruder
buffer: Vivid_1_buffer
drive_stepper: Vivid_1_drive
selector_stepper: Vivid_1_selector
long_moves_speed: 120
long_moves_accel: 50
enable_buffer_tool_check: True

#--------------------------- Steppers ---------------------------#
[AFC_stepper Vivid_1_drive]
unit: Vivid_1
step_pin: Vivid_1:MDRV_STEP
dir_pin: Vivid_1:MDRV_DIR
enable_pin: !Vivid_1:MDRV_EN
microsteps: 16
rotation_distance: 360
gear_ratio: 43:1

[tmc2209 AFC_stepper Vivid_1_drive]
uart_pin: Vivid_1:MDRV_UART
uart_address: 0
run_current: 0.8
sense_resistor: 0.110

[AFC_stepper Vivid_1_selector]
unit: Vivid_1
step_pin: Vivid_1:MSEL_STEP
dir_pin: Vivid_1:MSEL_DIR
enable_pin: !Vivid_1:MSEL_EN
microsteps: 16
rotation_distance: 400
gear_ratio: 2.5:1

[tmc2209 AFC_stepper Vivid_1_selector]
uart_pin: Vivid_1:MSEL_UART
uart_address: 0
run_current: 1.0
sense_resistor: 0.110

#--------------------------- Lanes ---------------------------#
[AFC_lane lane1]
unit: Vivid_1:1
dist_hub: 2000
led_index: AFC_Indicator_1:1-7
load: Vivid_1_buffer:LOAD1
prep: Vivid_1:PREP1
selector: !Vivid_1:SEL1

[AFC_lane lane2]
unit: Vivid_1:2
dist_hub: 2000
led_index: AFC_Indicator_1:8-14
load: Vivid_1_buffer:LOAD2
prep: Vivid_1:PREP2
selector: !Vivid_1:SEL2

[AFC_lane lane3]
unit: Vivid_1:3
dist_hub: 2000
led_index: AFC_Indicator_2:1-7
load: Vivid_1_buffer:LOAD3
prep: Vivid_1:PREP3
selector: !Vivid_1:SEL3

[AFC_lane lane4]
unit: Vivid_1:4
dist_hub: 2000
led_index: AFC_Indicator_2:8-14
load: Vivid_1_buffer:LOAD4
prep: Vivid_1:PREP4
selector: !Vivid_1:SEL4

#--------------------------- Buffer / Hub ---------------------------#
[AFC_buffer Vivid_1_buffer]
advance_pin: Vivid_1_buffer:ADV
trailing_pin: Vivid_1_buffer:TRAIL
multiplier_high: 1.15
multiplier_low: 0.90

[AFC_hub Vivid_1]
afc_bowden_length: 2000
switch_pin: virtual

#--------------------------- LEDs ---------------------------#
[AFC_led AFC_Indicator_1]
pin: Vivid_1:RGB1
chain_count: 14
color_order: GRB
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 0.0

[AFC_led AFC_Indicator_2]
pin: Vivid_1:RGB2
chain_count: 14
color_order: GRB
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 0.0

#--------------------------- Controller Fan ---------------------------#
[controller_fan Vivid_1_fan]
pin: Vivid_1:CONTROLLER_FAN
stepper: AFC_stepper Vivid_1_drive, AFC_stepper Vivid_1_selector

#--------------------------- Dryer Sensors ---------------------------#
[temperature_sensor Vivid_1_PTC_temp]
sensor_pin: Vivid_1:PTC
sensor_type: Generic 3950
pullup_resistor: 2200
min_temp: -20
max_temp: 100

[temperature_sensor Vivid_1_dryer_left]
sensor_type: AHT3X
i2c_mcu: Vivid_1
i2c_software_scl_pin: Vivid_1:DRYL_SCL
i2c_software_sda_pin: Vivid_1:DRYL_SDA
aht10_report_time: 5
min_temp: -20
max_temp: 100

[temperature_sensor Vivid_1_dryer_right]
sensor_type: AHT3X
i2c_mcu: Vivid_1
i2c_software_scl_pin: Vivid_1:DRYR_SCL
i2c_software_sda_pin: Vivid_1:DRYR_SDA
aht10_report_time: 5
min_temp: -20
max_temp: 100

#--------------------------- Dryer Heater ---------------------------#
[heater_generic Vivid_1_dryer]
heater_pin: Vivid_1:HEATER
sensor_type: temperature_combined
sensor_list: aht10 Vivid_1_dryer_left, aht10 Vivid_1_dryer_right
combination_method: max
maximum_deviation: 100
control: pid
pid_Kp: 51.604
pid_Ki: 1.121
pid_Kd: 593.934
min_temp: -20
max_temp: 65

[verify_heater Vivid_1_dryer]
max_error: 300
check_gain_time: 600
hysteresis: 10
heating_gain: 1

[heater_fan Vivid_1_dryer_fan]
pin: Vivid_1:DRY_FAN
max_power: 0.3
shutdown_speed: 0
heater: Vivid_1_dryer
