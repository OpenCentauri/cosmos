# Klipper gcode_shell_command bindings for the cosmos-cpu-tuning governor
# macros. Kept separate from cosmos-cpu-tuning.cfg because shell.cfg
# conventions in cosmos already aggregate gcode_shell_command entries
# (CAMERA_LIGHT_ON/OFF, CAMERA_START/STOP, GUI_START/STOP, START_DOOM).
#
# The command validates the requested governor against an allowlist before
# writing sysfs, so a malformed macro override cannot turn the
# RUN_SHELL_COMMAND call into arbitrary-string injection.
#
# Section name uses [gcode_shell_command ...] (with the gcode_ prefix);
# [shell_command ...] is not a valid kalico section and produces a
# configparser.Error at klippy startup.

[gcode_shell_command cpu_governor_set]
command: /usr/bin/sh -c 'g="$0"; case "$g" in performance|schedutil|ondemand|powersave|conservative) for c in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do echo "$g" > "$c" 2>/dev/null || true; done; logger -t cpu-governor "set $g (printer=$(date -u +%FT%TZ))" ;; *) logger -t cpu-governor "REFUSE invalid governor=$g" ;; esac'
timeout: 5.
verbose: False
