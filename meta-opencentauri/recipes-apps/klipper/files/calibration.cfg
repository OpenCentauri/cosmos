[gcode_macro _CHECK_CALIBRATION_VARS]
variable_shaper_calibrated: False
variable_bed_mesh_calibrated: False
variable_load_cell_calibrated: False
variable_extruder_pid_calibrated: False
variable_all_calibrated: False
gcode:
  {% set settings = printer["gcode_macro _COSMOS_SETTINGS"]|default({}) %}
  {% set bypass_calibration = settings.bypass_calibration|default(false)|lower == 'true' %}

  {% if bypass_calibration %}
    SET_GCODE_VARIABLE MACRO=_CHECK_CALIBRATION_VARS VARIABLE=all_calibrated VALUE=True
    RETURN
  {% endif %}

  {% set shaper_freq_x = printer.configfile.settings.input_shaper.shaper_freq_x|default(0)|float %}
  {% set shaper_freq_y = printer.configfile.settings.input_shaper.shaper_freq_y|default(0)|float %}
  {% set shaper_calibrated = shaper_freq_x > 0 and shaper_freq_y > 0 %}
  {% set bed_mesh_default_exists = 'bed_mesh default' in printer.configfile.settings %} 
  {% set load_cell_probe_reference_tare_counts = printer.configfile.settings.load_cell_probe.reference_tare_counts|default(71000)|int %}
  {% set load_cell_probe_calibrated = load_cell_probe_reference_tare_counts != 71000  %}
  {% set extruder_pid_kp = printer.configfile.settings.extruder.pid_kp %}
  {% set extruder_pid_calibrated = extruder_pid_kp != 24.860427 %}
  {% set all_calibrated = shaper_calibrated and bed_mesh_default_exists and load_cell_probe_calibrated and extruder_pid_calibrated %}

  SET_GCODE_VARIABLE MACRO=_CHECK_CALIBRATION_VARS VARIABLE=shaper_calibrated VALUE={shaper_calibrated}
  SET_GCODE_VARIABLE MACRO=_CHECK_CALIBRATION_VARS VARIABLE=bed_mesh_calibrated VALUE={bed_mesh_default_exists}
  SET_GCODE_VARIABLE MACRO=_CHECK_CALIBRATION_VARS VARIABLE=load_cell_calibrated VALUE={load_cell_probe_calibrated}
  SET_GCODE_VARIABLE MACRO=_CHECK_CALIBRATION_VARS VARIABLE=extruder_pid_calibrated VALUE={extruder_pid_calibrated}
  SET_GCODE_VARIABLE MACRO=_CHECK_CALIBRATION_VARS VARIABLE=all_calibrated VALUE={all_calibrated}

[delayed_gcode check_vars]
initial_duration: 1
gcode:
  _CHECK_CALIBRATION_VARS

[gcode_macro CHECK_CALIBRATION]
gcode:
  {% set shaper_calibrated = printer["gcode_macro _CHECK_CALIBRATION_VARS"].shaper_calibrated %}
  {% set bed_mesh_calibrated = printer["gcode_macro _CHECK_CALIBRATION_VARS"].bed_mesh_calibrated %}
  {% set load_cell_calibrated = printer["gcode_macro _CHECK_CALIBRATION_VARS"].load_cell_calibrated %}
  {% set extruder_pid_calibrated = printer["gcode_macro _CHECK_CALIBRATION_VARS"].extruder_pid_calibrated %}

  RESPOND TYPE=command MSG="action:prompt_begin Current Calibration"

  {% if shaper_calibrated %}
    RESPOND TYPE=command MSG="action:prompt_text ✅ Resonance Compensation calibrated"
  {% else %}
    RESPOND TYPE=command MSG="action:prompt_text ❌ Resonance Compensation not calibrated"
  {% endif %}

  {% if bed_mesh_calibrated %}
    RESPOND TYPE=command MSG="action:prompt_text ✅ Default bed mesh created"
  {% else %}
    RESPOND TYPE=command MSG="action:prompt_text ❌ Default bed mesh missing"
  {% endif %}

  {% if load_cell_calibrated %}
    RESPOND TYPE=command MSG="action:prompt_text ✅ Load cell calibrated"
  {% else %}
    RESPOND TYPE=command MSG="action:prompt_text ❌ Load cell not calibrated"
  {% endif %}

  {% if extruder_pid_calibrated %}
    RESPOND TYPE=command MSG="action:prompt_text ✅ Extruder PID calibrated"
  {% else %}
    RESPOND TYPE=command MSG="action:prompt_text ❌ Extruder PID not calibrated"
  {% endif %}

  RESPOND TYPE=command MSG="action:prompt_footer_button Run Calibrations|_DO_CALIBRATION|warning"
  RESPOND TYPE=command MSG="action:prompt_footer_button Close|_CLOSE_PROMPT"
  RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _DO_CALIBRATION]
gcode:
  RESPOND TYPE=command MSG="action:prompt_begin Run Calibrations"

  RESPOND TYPE=command MSG="action:prompt_button_group_start"
  RESPOND TYPE=command MSG="action:prompt_button Calibrate Resonances|_CALIBRATE_RESONANCES_STEP_1|info"
  RESPOND TYPE=command MSG="action:prompt_button Calibrate Bed Mesh|_CALIBRATE_BED_MESH_STEP_1|info"
  RESPOND TYPE=command MSG="action:prompt_button_group_end"

  RESPOND TYPE=command MSG="action:prompt_button_group_start"
  RESPOND TYPE=command MSG="action:prompt_button Calibrate Load Cells|_CALIBRATE_LOAD_CELL_STEP_1|info"
  RESPOND TYPE=command MSG="action:prompt_button Calibrate Extruder PID|_CALIBRATE_EXTRUDER_PID_STEP_1|info"
  RESPOND TYPE=command MSG="action:prompt_button_group_end"

  RESPOND TYPE=command MSG="action:prompt_footer_button Calibrate All|_CALIBRATE_ALL_STEP_1|warning"
  RESPOND TYPE=command MSG="action:prompt_footer_button Close|_CLOSE_PROMPT"
  RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _CLEAR_BED_MESSAGE]
gcode:
  {% set title = params.TITLE %}
  {% set gcode = params.GCODE %}
  {% set extra = params.EXTRA|default('') %}
  
  RESPOND TYPE=command MSG="action:prompt_begin {title}"
  RESPOND TYPE=command MSG="action:prompt_text Please clear out the chamber and bed of any foreign objects and click Ready."
  {% if extra %}
    RESPOND TYPE=command MSG="action:prompt_text {extra}"
  {% endif %}
  
  RESPOND TYPE=command MSG="action:prompt_footer_button Back|_DO_CALIBRATION"
  RESPOND TYPE=command MSG="action:prompt_footer_button Ready|{gcode}|primary"
  RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _CALIBRATE_LOAD_CELL_STEP_1]
gcode:
  _CLEAR_BED_MESSAGE TITLE="Calibrate load cells (1/2)" GCODE="_CALIBRATE_LOAD_CELL_STEP_2"

[gcode_macro _CALIBRATE_LOAD_CELL_STEP_2]
gcode:
  _CLOSE_PROMPT
  G28
  G0 Z128 F1500
  M400
  G4 P500
  LOAD_CELL_CALIBRATE
  G4 P500
  TARE
  RESPOND TYPE=command MSG="action:prompt_begin Calibrate load cells (2/2)"
  RESPOND TYPE=command MSG="action:prompt_text Please place a (mostly) full 1kg filament spool on top of the bed. Alternatively, put roughly 1150g on the bed. Afterwards, click Ready."
  RESPOND TYPE=command MSG="action:prompt_footer_button Ready|_CALIBRATE_LOAD_CELL_STEP_3|primary"
  RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _CALIBRATE_LOAD_CELL_STEP_3]
gcode:
  _CLOSE_PROMPT
  CALIBRATE GRAMS=1150
  ACCEPT
  _SAVE_CONFIG_PROMPT

[gcode_macro _CALIBRATE_BED_MESH_STEP_1]
gcode:
  {% set load_cell_calibrated = printer["gcode_macro _CHECK_CALIBRATION_VARS"].load_cell_calibrated %}

  {% if not load_cell_calibrated %}
    RESPOND TYPE=command MSG="action:prompt_begin Calibrate Bed Mesh"
    RESPOND TYPE=command MSG="action:prompt_text Load cells are not calibrated. Please calibrate the load cells first."
    RESPOND TYPE=command MSG="action:prompt_footer_button Back|_DO_CALIBRATION"
    RESPOND TYPE=command MSG="action:prompt_show"
    RETURN
  {% endif %}

  RESPOND TYPE=command MSG="action:prompt_begin Calibrate default bed mesh"
  RESPOND TYPE=command MSG="action:prompt_text Please clear out the chamber and bed of any foreign objects. Pick a default bed mesh temperature."
  RESPOND TYPE=command MSG="action:prompt_footer_button 60|_CALIBRATE_BED_MESH_STEP_2 TEMP=60|warning"
  RESPOND TYPE=command MSG="action:prompt_footer_button 80|_CALIBRATE_BED_MESH_STEP_2 TEMP=80|warning"
  RESPOND TYPE=command MSG="action:prompt_footer_button 100|_CALIBRATE_BED_MESH_STEP_2 TEMP=100|warning"
  RESPOND TYPE=command MSG="action:prompt_footer_button Back|_DO_CALIBRATION"
  RESPOND TYPE=command MSG="action:prompt_show"

  _CLEAR_BED_MESSAGE TITLE="Calibrate default bed mesh" GCODE=_CALIBRATE_BED_MESH_STEP_2

[gcode_macro _CALIBRATE_BED_MESH_STEP_2]
gcode:
  {% set bed_temp = params.TEMP|float %}
  
  _CLOSE_PROMPT
  G28
  M400
  BED_MESH_CALIBRATE_WITH_WIPE BED_TEMP={bed_temp}
  _SAVE_CONFIG_PROMPT

[gcode_macro _CALIBRATE_RESONANCES_STEP_1]
gcode:
  _CLEAR_BED_MESSAGE TITLE="Calibrate resonances" GCODE=_CALIBRATE_RESONANCES_STEP_2 EXTRA="The screen and the camera will be disabled during the calibration."

[gcode_macro _CALIBRATE_RESONANCES_STEP_2]
gcode:
  _CLOSE_PROMPT
  RUN_SHELL_COMMAND CMD=CAMERA_STOP
  RUN_SHELL_COMMAND CMD=GUI_STOP
  G28
  M400
  SHAPER_CALIBRATE AXIS=X
  G4 P1000
  SHAPER_CALIBRATE AXIS=Y
  G4 P1000
  RUN_SHELL_COMMAND CMD=CAMERA_START
  RUN_SHELL_COMMAND CMD=GUI_START
  _SAVE_CONFIG_PROMPT

[gcode_macro _CALIBRATE_EXTRUDER_PID_STEP_1]
gcode:
  RESPOND TYPE=command MSG="action:prompt_begin Calibrate extruder PID"
  RESPOND TYPE=command MSG="action:prompt_text Please clear out the chamber and bed of any foreign objects. Pick a hotend temperature for PID calibration."
  RESPOND TYPE=command MSG="action:prompt_footer_button 220|_CALIBRATE_EXTRUDER_PID_STEP_2 TEMP=220|warning"
  RESPOND TYPE=command MSG="action:prompt_footer_button 240|_CALIBRATE_EXTRUDER_PID_STEP_2 TEMP=240|warning"
  RESPOND TYPE=command MSG="action:prompt_footer_button 260|_CALIBRATE_EXTRUDER_PID_STEP_2 TEMP=260|warning"
  RESPOND TYPE=command MSG="action:prompt_footer_button 280|_CALIBRATE_EXTRUDER_PID_STEP_2 TEMP=280|warning"
  RESPOND TYPE=command MSG="action:prompt_footer_button Back|_DO_CALIBRATION"
  RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _CALIBRATE_EXTRUDER_PID_STEP_2]
gcode:
  {% set extruder_temp = params.TEMP|float %}

  _CLOSE_PROMPT
  G28
  MOVE_TO_TRAY
  M400 
  PID_CALIBRATE HEATER=extruder TARGET={extruder_temp}
  M729

  _SAVE_CONFIG_PROMPT

[gcode_macro _CALIBRATE_ALL_STEP_1]
gcode:
  _CLEAR_BED_MESSAGE TITLE="Calibrate all" GCODE=_CALIBRATE_ALL_STEP_2 EXTRA="Defaults for bed mesh temperature (60c) and PID hotend temperature (250c) will be used. The screen and the camera will be disabled during the calibration."

[gcode_macro _CALIBRATE_ALL_STEP_2]
gcode:
  _CLOSE_PROMPT
  G28
  G0 Z128 F1500
  M400
  G4 P500
  LOAD_CELL_CALIBRATE
  G4 P500
  TARE
  RESPOND TYPE=command MSG="action:prompt_begin Calibrate load cells"
  RESPOND TYPE=command MSG="action:prompt_text Please place a (mostly) full 1kg filament spool on top of the bed. Alternatively, put roughly 1150g on the bed. Afterwards, click Ready."
  RESPOND TYPE=command MSG="action:prompt_footer_button Ready|_CALIBRATE_ALL_STEP_3|primary"
  RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _CALIBRATE_ALL_STEP_3]
gcode:
  _CLOSE_PROMPT
  
  SET_DISPLAY_TEXT MSG="Performing extruder PID calibration"
  MOVE_TO_TRAY
  PID_CALIBRATE HEATER=extruder TARGET=250
  M729
  M400

  SET_DISPLAY_TEXT MSG="Performing probe z-offset & bed mesh calibration"
  G90
  G1 X128 Y128 F6000
  BED_MESH_CALIBRATE_WITH_WIPE BED_TEMP=60

  SET_DISPLAY_TEXT MSG="Performing shaper calibration"
  RUN_SHELL_COMMAND CMD=CAMERA_STOP
  RUN_SHELL_COMMAND CMD=GUI_STOP
  G28
  M400
  SHAPER_CALIBRATE AXIS=X
  G4 P1000
  SHAPER_CALIBRATE AXIS=Y
  G4 P1000
  RUN_SHELL_COMMAND CMD=CAMERA_START
  RUN_SHELL_COMMAND CMD=GUI_START
  _SAVE_CONFIG_PROMPT

[delayed_gcode open_oobe]
initial_duration: 2
gcode:
  {% set all_calibrated = printer["gcode_macro _CHECK_CALIBRATION_VARS"].all_calibrated %}
  
  {% if not all_calibrated %}
    RESPOND TYPE=command MSG="action:prompt_begin Welcome to COSMOS!"
    RESPOND TYPE=command MSG="action:prompt_text It looks like you haven't ran the initial calibration yet. Click the CHECK_CALIBRATION button below (or run the CHECK_CALIBRATION command in the console, or from the macros section) to check on the calibration status of your machine. Calibrating your machine is required before you can start printing."
    RESPOND TYPE=command MSG="action:prompt_text If you'd like to bypass calibration, set bypass_calibration to True in cosmos.conf"
    RESPOND TYPE=command MSG="action:prompt_footer_button CHECK_CALIBRATION|CHECK_CALIBRATION|primary"
    RESPOND TYPE=command MSG="action:prompt_show"
  {% endif %}