# CC2 hardware configuration.
# User overrides belong in printer.cfg, not this file.

[mcu]
serial: /dev/rpmsg_ctrl-dsp_rproc@0
restart_method: command

[mcu toolhead]
serial: /dev/ttyS3
baud: 250000
power_pin: host:PE17
restart_method: command

[mcu bed_sensor]
serial: /dev/ttyS0
baud: 500000
power_pin: host:PB11
restart_method: command

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 20000
max_z_velocity: 20
max_z_accel: 500
square_corner_velocity: 9

[gcode_arcs]
resolution: 0.5

[pause_resume]

[exclude_object]

[idle_timeout]
gcode: _IDLE_TIMEOUT
timeout: 1800

[virtual_sdcard]
path: /etc/klipper/gcodes

[danger_options]
multi_mcu_trsync_timeout: 0.03

[stepper_x]
step_pin: PG18
dir_pin: !PF1
enable_pin: !PF6
endstop_pin: tmc2209_stepper_x:virtual_endstop
microsteps: 16
full_steps_per_rotation: 200
position_endstop: -2
position_max: 256.5
position_min: -2.1
homing_speed: 60
homing_retract_dist: 0
rotation_distance: 39.872

[tmc2209 stepper_x]
uart_pin: PE6
tx_pin: PE7
uart_address: 0
interpolate: true
run_current: 1.2
hold_current: 0.8
sense_resistor: 0.1
driver_sgthrs: 130
diag_pin: PF0

[stepper_y]
step_pin: PG16
dir_pin: !PG17
enable_pin: !PE15
endstop_pin: tmc2209_stepper_y:virtual_endstop
microsteps: 16
full_steps_per_rotation: 200
position_endstop: -2
position_max: 270
position_min: -2.1
homing_speed: 60
homing_retract_dist: 0
rotation_distance: 39.872

[tmc2209 stepper_y]
uart_pin: PE6
tx_pin: PE7
uart_address: 3
interpolate: true
run_current: 1.2
hold_current: 0.8
sense_resistor: 0.1
driver_sgthrs: 130
diag_pin: PF3

[stepper_z]
step_pin: PE16
dir_pin: !PF5
enable_pin: !PE12
endstop_pin: ^PB10
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 8
position_endstop: 0
position_max: 258
position_min: -10
homing_speed: 10
homing_retract_dist: 2
second_homing_speed: 5

[tmc2209 stepper_z]
uart_pin: PE6
tx_pin: PE7
uart_address: 1
interpolate: true
run_current: 1.0
sense_resistor: 0.1
driver_sgthrs: 120
diag_pin: PE14

[extruder]
step_pin: toolhead:PB5
dir_pin: toolhead:PB6
enable_pin: !toolhead:PB7
heater_pin: toolhead:PB8
sensor_pin: toolhead:PA3
sensor_type: CC2 extruder thermistor
microsteps: 16
full_steps_per_rotation: 200
gear_ratio: 52:10
rotation_distance: 28.8
nozzle_diameter: 0.4
filament_diameter: 1.75
min_temp: 5
max_temp: 335
min_extrude_temp: 180
pressure_advance: 0.043
pressure_advance_smooth_time: 0.04
max_extrude_only_distance: 300
max_extrude_cross_section: 5
control: pid
pid_Kp: 25.989
pid_Ki: 3.397
pid_Kd: 49.705

[tmc2209 extruder]
uart_pin: toolhead:PB11
uart_address: 2
interpolate: true
run_current: 0.8
hold_current: 0.2
sense_resistor: 0.1

[thermistor CC2 extruder thermistor]
temperature1: 25
resistance1: 268000
temperature2: 200
resistance2: 1104
temperature3: 350
resistance3: 98

[verify_heater extruder]

[heater_fan extruder]
pin: toolhead:PB13
tachometer_pin: toolhead:PB14
tachometer_poll_interval: 0.001

[fan]
pin: toolhead:PA8
tachometer_pin: toolhead:PB15
tachometer_poll_interval: 0.001

[lis2dw]
cs_pin: toolhead:PA4
spi_software_sclk_pin: toolhead:PA5
spi_software_mosi_pin: toolhead:PA7
spi_software_miso_pin: toolhead:PA6
spi_speed: 5000000
axes_map: x,y,z

[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 53.6
shaper_type_y: mzv
shaper_freq_y: 44.8
damping_ratio_x: 0.1
damping_ratio_y: 0.1

[resonance_tester]
accel_chip: lis2dw
probe_points: 128,128,5
min_freq: 5
max_freq: 90
accel_per_hz: 100
hz_per_sec: 2

[heater_bed]
heater_pin: PG13
sensor_pin: PH1
sensor_type: CC2 100K beta 3950
min_temp: -10
max_temp: 125
control: pid
pid_Kp: 46.504839
pid_Ki: 1.453276
pid_Kd: 372.038710

[thermistor CC2 100K beta 3950]
temperature1: 25
resistance1: 100000
beta: 3950

[verify_heater heater_bed]
max_error: 60
check_gain_time: 60
hysteresis: 5
heating_gain: 2

[bed_mesh]
speed: 150
horizontal_move_z: 2
mesh_min: 10,10
mesh_max: 246,246
probe_count: 9,9
mesh_pps: 3,3
algorithm: bicubic
adaptive_margin: 3

[load_cell_probe]
sensor_type: cs1237
sclk_pin: bed_sensor:PA5
drdy_pin: bed_sensor:PA4
gain: 128
sample_rate: 1280
samples: 2
samples_tolerance_retries: 3
speed: 2
sample_retract_dist: 1
lift_speed: 5
counts_per_gram: 29.11
reference_tare_counts: 71000
z_offset: -0.15
samples_result: median
trigger_force: 50
drop_first_result: true
force_safety_limit: 2000
drift_safety_limit: 1000
pullback_distance: 0.2
pullback_speed: 1.0

[filament_switch_sensor filament_sensor]
switch_pin: !toolhead:PB1
pause_on_runout: false
debounce_delay: 0.2

[fan_generic aux_fan]
pin: PD15
tachometer_pin: PD14

[fan_generic case_fan]
pin: PD17
tachometer_pin: PD16

[controller_fan board_cooling_fan]
pin: PG15
stepper: stepper_x,stepper_y,stepper_z,extruder
fan_speed: 1.0
idle_speed: 0.0
idle_timeout: 30
heater: extruder,heater_bed
tachometer_pin: PB9
tachometer_poll_interval: 0.001

[led case]
white_pin: PB5
initial_WHITE: 1

[temperature_sensor chamber]
sensor_pin: PH0
sensor_type: CC2 100K beta 3950
min_temp: 5
max_temp: 110

[temperature_sensor mcu_toolhead]
sensor_type: temperature_mcu
sensor_mcu: toolhead

[temperature_sensor mcu_bed]
sensor_type: temperature_mcu
sensor_mcu: bed_sensor

[output_pin z_endstop_power]
pin: PG12
value: 1
shutdown_value: 1

[screws_tilt_adjust]
screw1: 231,25
screw1_name: front right screw
screw2: 231,225
screw2_name: rear right screw
screw3: 31,225
screw3_name: rear left screw
screw4: 31,25
screw4_name: front left screw
horizontal_move_z: 5
speed: 300
screw_thread: CCW-M3
