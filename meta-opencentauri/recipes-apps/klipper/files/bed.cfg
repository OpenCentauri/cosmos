[mcu bed]
serial: /dev/ttyS4
baud: 115200
restart_method: command

[bed_mesh]
speed: 150.0
horizontal_move_z: 2.0
mesh_min: 20,20
mesh_max: 246,246
probe_count: 11,11
mesh_pps: 3,3
algorithm: bicubic
adaptive_margin: 5.0

[hx711s]
samples: 2
samples_tolerance_retries: 2
speed: 2.0
sample_retract_dist: 1.0
lift_speed: 5.0
z_offset: 0.0
enable_test : 0
count : 4
sg_mode : 3
install_dir : 0
enable_hpf : 0
find_index_mode : 4
enable_shake_filter : 1
enable_channels : 16
rest_ticks : 3125
kalman_q : 10000
kalman_r : 100
max_th : 6000
min_th : 2000
th_k : 1
k_slope : 58
bias_slope : 42
sensor0_clk_pin : bed:PB13
sensor1_clk_pin : bed:PC7
sensor2_clk_pin : bed:PC6
sensor3_clk_pin : bed:PC9
sensor0_sdo_pin : bed:PB14
sensor1_sdo_pin : bed:PC8
sensor2_sdo_pin : bed:PB15
sensor3_sdo_pin : bed:PA8