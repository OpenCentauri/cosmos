# -----
# PLEASE DO NOT EDIT THIS FILE. EDIT printer.cfg INSTEAD.
# EDITING THIS FILE WILL EXCLUDE YOUR CHANGES FROM FUTURE UPDATES.
# -----



[gcode_macro _global_var]
variable_pause_park:{'x': 10, 'y': 240, 'z': 10, 'e': 2}
variable_cancel_park:{'x': 240, 'y': 240, 'z': 10, 'e': 5}
variable_extruder_temp:{'probing': 140, 'cleaning': 180, 'loading': 230, 'purging': 250}
variable_z_maximum_lifting_distance: 250
variable_pause_resume_travel_speed: 150
variable_heatsoak: 1
variable_adaptive_mesh: True
variable_adaptive_purge: True
gcode:

[gcode_macro ALL_FANS_OFF]
gcode:
    M107
    SET_FAN_SPEED FAN=aux_fan SPEED=0
    SET_FAN_SPEED FAN=case_fan SPEED=0
    SET_DISPLAY_TEXT MSG="ALL FANS OFF!"

[gcode_macro _IDLE_TIMEOUT]
gcode:
    {% if printer.print_stats.state == "paused" %}
      SET_DISPLAY_TEXT MSG="PAUSED"
    {% else %}
     M84
     TURN_OFF_HEATERS
     ALL_FANS_OFF
     SET_DISPLAY_TEXT MSG="No operations in 30mins!"
    {% endif %}

[gcode_macro M600]
gcode:
    PAUSE STATE=filament_change

[gcode_macro PRINT_START]
gcode:
    {% set target_bed = params.BED|int %}
    {% set target_extruder = params.EXTRUDER|int %}
    {% set target_chamber = params.CHAMBER|int %}
    {% set sensor = printer['filament_switch_sensor filament_sensor'] %}
    {% set svar = printer['gcode_macro _global_var'] %}
    ALL_FANS_OFF
    BED_MESH_CLEAR
    CLEAR_PAUSE
    G90
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"
    M140 S{target_bed}
    G28
    {% if sensor.enabled and not sensor.filament_detected %}
        SET_DISPLAY_TEXT MSG="NO FILAMENT LOADED!"
        CANCEL_PRINT
        RETURN
    {% endif %}
    CLEAN_NOZZLE
  
    {% if target_chamber > 0 %}
        SET_DISPLAY_TEXT MSG="Chamber: {target_chamber}c"
        M106 S255
        G0 X128 Y128 Z10 F9000
        TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={target_chamber}
        M107
    {% endif %}
    M190 S{target_bed}

  # rehome after thermal expansion
    SET_DISPLAY_TEXT MSG="Heatsoak: {svar.heatsoak}m"
    G4 P{svar.heatsoak*1000*60}
    LOADCELL_Z_HOME
    {% if svar.adaptive_mesh %}
        M109 S{svar.extruder_temp.probing}
        SET_DISPLAY_TEXT MSG="Bed mesh adaptive"
        BED_MESH_CALIBRATE ADAPTIVE=1
    {% else %}
        {% if "default" in printer.bed_mesh.profiles %}
            SET_DISPLAY_TEXT MSG="Bed mesh default"
            BED_MESH_PROFILE LOAD=default
        {% else %}
            SET_DISPLAY_TEXT MSG="NO BED MESH!"
            CANCEL_PRINT
            RETURN
        {% endif %}
    {% endif %}

    {% if svar.adaptive_purge %}
        SMART_PARK
    {% endif %}

    SET_DISPLAY_TEXT MSG="Hotend: {target_extruder}c"
    M109 S{target_extruder}
    {% if svar.adaptive_purge %}
        LINE_PURGE
    {% endif %}
    SET_DISPLAY_TEXT MSG="Printer goes brr"
    G90

[gcode_macro PRINT_END]
gcode:
    {% set svar = printer['gcode_macro _global_var'] %}
    {% set z_max = svar.z_maximum_lifting_distance|int %}
    {% set e_mintemp  = printer.configfile.settings['extruder'].min_extrude_temp %}
    {% set sensor = printer['filament_switch_sensor filament_sensor'] %}
  
    {% if printer.toolhead.homed_axes|lower == "xyz" %}
        G91
        {% if sensor.enabled and sensor.filament_detected %}
            {% if (printer.extruder.target != 0 and printer.extruder.temperature >= printer.extruder.target and printer.extruder.temperature >= e_mintemp) %}
                G1 E-5 F2700
                G1 E-2 Z0.2 F2400
            {% endif %}
        {% endif %}

        {% if (printer.gcode_move.position.z + 10) < z_max %}
            G1 Z+10 F3000
        {% else %}
            G1 Z+{(z_max - printer.gcode_move.position.z)} F3000
        {% endif %}
        G90
        G1 X240 Y240 F9000
    {% endif %}
    ALL_FANS_OFF
    TURN_OFF_HEATERS 
    M220 S100
    M221 S100
    CLEAR_PAUSE
    M84
    SET_DISPLAY_TEXT MSG="Finish Print!"


[gcode_macro CANCEL_PRINT]
description: 
rename_existing: CANCEL_PRINT_BASE
gcode:
    {% set svar = printer['gcode_macro _global_var'] %}
    {% set x_park = svar.cancel_park.x %}
    {% set y_park = svar.cancel_park.y %}
    {% set z_park = svar.cancel_park.z %}
    {% set z_lift_max = svar.z_maximum_lifting_distance %}
    {% set e_restract = svar.cancel_park.e %}
    {% set e_mintemp  = printer.configfile.settings['extruder'].min_extrude_temp %}
    {% set sensor = printer['filament_switch_sensor filament_sensor'] %}

    CANCEL_PRINT_BASE
    {% if printer.toolhead.homed_axes|lower == "xyz" %}
        G91
        {% if sensor.enabled and sensor.filament_detected %}
            {% if (printer.extruder.target != 0 and printer.extruder.temperature >= printer.extruder.target and printer.extruder.temperature >= e_mintemp) %}
                G1 E-{e_restract} F2700
            {% else %}
                RESPOND TYPE=command MSG="Nozzle not hot enough"
            {% endif %}
        {% endif %}

        {%if (printer.gcode_move.position.z + 10) < z_lift_max %}
            G1 Z+10 F3000
        {% else %}
            G1 Z+{(z_lift_max - printer.gcode_move.position.z)} F3000
        {% endif %}
            G90
            G1 X{x_park} Y{y_park} F9000
    {% endif %}
    ALL_FANS_OFF
    TURN_OFF_HEATERS 
    M220 S100
    M221 S100
    CLEAR_PAUSE
    M84
    SET_DISPLAY_TEXT MSG="Cancel Print Success!"

[gcode_macro PAUSE]
rename_existing: PAUSE_BASE
variable_state: 'normal'
gcode:
    {% set svar = printer['gcode_macro _global_var'] %}
    {% set state = params.STATE|default('normal') %}
    {% set x_park = svar.pause_park.x|float %}
    {% set y_park = svar.pause_park.y|float %}
    {% set e_retract = svar.pause_park.e|float %}
    {% set z_lift_max = svar.z_maximum_lifting_distance|int %}
    {% set sensor = printer['filament_switch_sensor filament_sensor'] %}
    {% set pos = printer.gcode_move.position %}

    {% if printer.pause_resume.is_paused == False %}
        SET_DISPLAY_TEXT MSG="Pausing"

        PAUSE_BASE
        G91

        {% if printer.toolhead.homed_axes|lower == "xyz" %}
            {% set zpos = printer.gcode_move.position.z %}
            {% if (zpos + 5) < z_lift_max %}
                G1 Z+5 F3000
            {% else %}
                G1 Z+{(z_lift_max - zpos)} F3000
            {% endif %}

            G90

            {% if pos.x != x_park or pos.y != y_park %}
                G1 X{x_park} Y{y_park} F{svar.pause_resume_travel_speed * 60}
            {% endif %}
        {% endif %}

        # Keep heater on so resume can prime quickly
        M104 S{printer.extruder.target}

        {% if state == 'normal' %}
            {% if (printer.extruder.temperature + 5 >= printer.extruder.target) and extruder.can_extrude  %}
                {% if sensor.enabled and sensor.filament_detected %}
                    G91
                    G1 E-{e_retract} F300 
                    G90
                {% endif %}
            {% endif %}
            SET_DISPLAY_TEXT MSG="Paused normal"

        {% elif state == 'filament_change' %}
            # Ensure nozzle is up to temp for filament change/unload
            {% if printer.extruder.temperature + 5 < printer.extruder.target %}
                M109 S{printer.extruder.target}
            {% endif %}
            UNLOAD_FILAMENT
            SET_DISPLAY_TEXT MSG="Paused for filament change"

        {% elif state == 'runout' %}
            # Runout pause: keep heater on and prompt user to insert filament
            SET_DISPLAY_TEXT MSG="Paused for runout"
            PURGE
            LOAD_FILAMENT

        {% endif %}

    {% else %}
        SET_DISPLAY_TEXT MSG="Printer already paused"
    {% endif %}



[delayed_gcode _resume_wait]
gcode:
    {% if printer['gcode_macro RESUME'].execute|lower != 'false' %}
        RESUME
    {% endif %}

[gcode_macro RESUME]
rename_existing: RESUME_BASE
variable_state: 'normal'
gcode:
    {% set svar = printer['gcode_macro _global_var'] %}
    {% set e_retract = svar.pause_park.e|float %}
    {% set extruder_target_temp = printer.extruder.target|int %}
    {% set sensor = printer['filament_switch_sensor filament_sensor'] %}

    # If filament sensor is enabled require filament present before resuming
    {% if sensor.enabled and not sensor.filament_detected %}
        RESPOND TYPE=command MSG="Please insert filament before resuming."
        RETURN
    {% endif %}

    # Ensure nozzle heated to target before attempting to prime/extrude
    # {% if printer.extruder.temperature + 5 < extruder_target_temp %}
    #     SET_DISPLAY_TEXT MSG="Heating nozzle to {extruder_target_temp}C"
    M109 S{extruder_target_temp}
    # {% endif %}
    G91
    G1 E{e_retract} F300
    G90
    SET_DISPLAY_TEXT MSG="Resuming"
    RESUME_BASE


[gcode_macro PURGE]
gcode:
    {% set svar = printer['gcode_macro _global_var'] %}

    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                         ; Home if necessary
    {% endif %}
    # Move to purge position
    MOVE_TO_TRAY
    M104 S{svar.extruder_temp.purging}                       ; Heat nozzle to purging temp
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={svar.extruder_temp.purging}
                    ; Heat nozzle to 250°C and wait

    # Purge filament (8 cycles)
    G92 E0                          ; Reset extruder position
    M106 S0                       ; Turn on part cooling fan (full speed)
    {% for purge in range(4) %}
        G1 E25 F300                     ; Extrude 13mm at medium speed
        G1 E10 F150                      ; Extrude 2mm slowly (ensure flow)
        M400                            ; Wait for completion
    {% endfor %}
    M104 S{svar.extruder_temp.loading}
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={svar.extruder_temp.loading}
    {% for purge in range(4) %}
        G1 E25 F300                     ; Extrude 13mm at medium speed
        G1 E10 F150                      ; Extrude 2mm slowly (ensure flow)
        M400                            ; Wait for completion
    {% endfor %}
    G1 E-2 F1800                    ; Retract 2mm to prevent oozing
    M104 S0
    M106 S255
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={svar.extruder_temp.cleaning}
    M107
    G0 X170
    G0 Y250
    G4 P1000
    MOVE_TO_TRAY
    G0 X170
    G0 Y250

# Home Z with Strain Gauge, ends up with the nozzle 2mm above bed



[gcode_macro LOADCELL_Z_HOME]
gcode:
    {% set svar = printer['gcode_macro _global_var'] %}
    
    M104 S{svar.extruder_temp.probing}
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                         ; Home if necessary
    {% endif %}
    BED_MESH_CLEAR
    # Move down a Z to get some clearance
    G91                            ; Relative positioning
    G1 Z5 F600
    G90
    G0 X128 Y128 F9000                      ; Move up 2mm
    M109 S{svar.extruder_temp.probing}  
    PROBE                           ; Probe with strain gauge
    M400                           ; Wait for moves to finish

    # Store the end position as new Z=0
    SET_KINEMATIC_POSITION Z=0 SET_HOMED=Z ; Set current Z as 0
    # Move up 2mm from the probed position
    M104 S0
    G91                             ; Relative positioning
    G1 Z5 F600                      ; Move up 2mm                         
    G90                             ; Absolute positioning
# Wipe Nozzle, see auto_leveling.cpp:443
[gcode_macro CLEAN_NOZZLE]
gcode:
    {% set svar = printer['gcode_macro _global_var'] %}
    BED_MESH_CLEAR
    M104 S{svar.extruder_temp.cleaning}
    {% if printer.toolhead.homed_axes != "xyz" %}
       G28
    {% endif %}
    G90

    # Move to tray
    MOVE_TO_TRAY    
    SET_DISPLAY_TEXT MSG="Cleaning nozzle: {svar.extruder_temp.cleaning}c"
    M104 S{svar.extruder_temp.cleaning}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={svar.extruder_temp.cleaning}
    M104 S{svar.extruder_temp.probing}
    M106 S255
    # Wipe
    G1 F9000
    {% for wipes in range(4) %}
        {% for i in range(8) %}
            {% set x = 187 - (i * 2) %}
            {% set y = 265 if i % 2 == 0 else 263 %}
            G1 X{x} Y{y}
        {% endfor %}
        G1 X187
    {% endfor %}
    # Move a 2mm on Y
    G1 Y263
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={svar.extruder_temp.probing}
    M104 S0

    G1 F9000
    {% for wipes in range(4) %}
        {% for i in range(8) %}
            {% set x = 187 - (i * 2) %}
            {% set y = 263 if i % 2 == 0 else 265 %}
            G1 X{x} Y{y}
        {% endfor %}
        G1 X187
    {% endfor %}
    # Add some clearance
    G1 Y250

    # Clear command queue

    M107 
    M400

[gcode_macro WIPE_NOZZLE]
gcode:
    {% set bed_temp = params.BED_TEMP|default(60)|int %}

    G28                             ; Home
    M204 S5000                      ; Set acceleration to 5000 mm/s
    M400                            ; Wait for moves to finish
    G90                             ; Absolute positioning
    M106 S0                         ; Turn off part cooling fan
    SET_FAN_SPEED FAN=aux_fan SPEED=0 ; Turn off auxiliary fan
    M83                             ; Relative extrusion mode

    # Move to purge position
    MOVE_TO_TRAY
    M109 S250                       ; Heat nozzle to 250°C and wait

    # Purge filament (8 cycles)
    G92 E0                          ; Reset extruder position
    M106 S255                       ; Turn on part cooling fan (full speed)
    SET_FAN_SPEED FAN=aux_fan SPEED=1 ; Turn on auxiliary fan (full speed)
    G1 E13 F523                     ; Extrude 13mm at medium speed
    G1 E2 F150                      ; Extrude 2mm slowly (ensure flow)
    M400                            ; Wait for completion
    G1 E13 F523                     ; Repeat purge cycle 2
    G1 E2 F150
    M400
    G1 E13 F523                     ; Repeat purge cycle 3
    G1 E2 F150
    M400
    G1 E13 F523                     ; Repeat purge cycle 4
    G1 E2 F150
    M400
    G1 E13 F523                     ; Repeat purge cycle 5
    G1 E2 F150
    M400
    G1 E13 F523                     ; Repeat purge cycle 6
    G1 E2 F150
    M400
    G1 E13 F523                     ; Repeat purge cycle 7
    G1 E2 F150
    M400
    G1 E13 F523                     ; Repeat purge cycle 8
    G1 E2 F150
    M400
    G1 E-2 F1800                    ; Retract 2mm to prevent oozing

    # Cool nozzle for cleaning
    M109 S180                       ; Cool to 180°C and wait
    M400                            ; Wait for moves
    M104 S140                       ; Start cooling to final temp (140°C)
    G4 P4000                           ; Dwell 4 seconds

    # Wipe nozzle using CLEAN_NOZZLE pattern
    M204 S15000                     ; Set high acceleration for wipe
    CLEAN_NOZZLE                            ; Execute wipe pattern (moves across wiper)
    M204 S5000                      ; Restore normal acceleration

    # --- ADDITIONAL NOZZLE CLEANING ---
    G1 X128 Y254 F3000              ; Move to cleaning brush area
    M140 S{bed_temp}                ; Keep bed at target temp

    STRAINGAUGE_Z_HOME              ; Home Z using strain gauge

    M400                            ; Wait for completion
    #G91                             ; Relative positioning
    #G1 Z2 F600                      ; Lift Z by 2mm
    #G90                             ; Absolute positioning
    G1 Z2 F600                      ; Ensure Z is 2mm above bed

    G1 Y261.5 F9000                 ; Move to brush position
    G91                             ; Relative positioning
    G1 Z-2.5 F600                   ; Lower into brush
    M400                            ; Wait for position

    # Scrub nozzle back and forth (4 passes)
    G90                             ; Absolute positioning
    G1 X140 F2000                   ; Scrub right
    G1 X110                         ; Scrub left
    G1 X140 F2000                   ; Scrub right
    G1 X110                         ; Scrub left
    G1 X140 F2000                   ; Scrub right
    G1 X110                         ; Scrub left
    G1 X140 F2000                   ; Scrub right
    G1 X110                         ; Scrub left
    G1 X140 F2000                   ; Final scrub right
    G1 X128                         ; Return to center
    M400                            ; Wait for completion

    # Lift and move away from brush
    G91                             ; Relative positioning
    G1 Z3 F600                      ; Lift Z by 3mm
    M400                            ; Wait
    G90                             ; Absolute positioning
    G1 Y254 F9000                   ; Move away from brush
    G1 X128 F9000                   ; Center X position

    # --- CALIBRATION PREPARATION ---
    M140 S{bed_temp}                ; Keep bed at target temp
    STRAINGAUGE_Z_HOME              ; Home Z with strain gauge again
    #G91                             ; Relative positioning
    #G1 Z-2.5 F600                   ; Lower slightly
    #G90                             ; Absolute positioning
    M400                            ; Wait for completion

    # Heat to calibration temperatures
    M140 S{bed_temp}                ; Heat bed to target temp
    M109 S140                       ; Heat nozzle to 140°C and wait
    M400                            ; Wait for stability
    M106 S0                         ; Turn off part cooling fan
    SET_FAN_SPEED FAN=aux_fan SPEED=0 ; Turn off auxiliary fan

    # Final positioning before probe calibration
    G91                             ; Relative positioning
    G1 Z2 F600                      ; Lift Z by 2mm
    G90                             ; Absolute positioning


# Move the toolhead to the tray
[gcode_macro MOVE_TO_TRAY]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                         ; Home if necessary
    {% endif %}

    G90                             ; Absolute positioning
    G0 X202 F12000
    G0 Y250 F12000             ; Move near to the try
    G0 Y265 F1200                 ; Move slowly back to the tray

    M400                            ; Wait for movements to complete

[gcode_macro _LOAD_FILAMENT_STEP_PUSH]
gcode:
    _CLOSE_PROMPT                   ; Close any existing prompt
    M83                            ; Relative extrusion mode
    G92 E0                         ; Reset extruder position
    G1 E60 F420                   ; Move filament into the extruder (120mm at 4mm/s)
    #CLEAN_NOZZLE                           ; Wipe nozzle after loading

    RESPOND TYPE=command MSG="action:prompt_begin Loading Filament"
    RESPOND TYPE=command MSG="action:prompt_text Load completed. Do you want to purge more?"
    RESPOND TYPE=command MSG="action:prompt_footer_button Purge more|_LOAD_FILAMENT_STEP_PUSH"
    RESPOND TYPE=command MSG="action:prompt_footer_button Done|_LOAD_FILAMENT_STEP_DONE"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _LOAD_FILAMENT_STEP_DONE]
gcode:
    _CLOSE_PROMPT                    ; Close the loading prompt
    CLEAN_NOZZLE                            ; Wipe nozzle after loading
    M104 S0                         ; Turn off nozzle heater
    #M106 S0                         ; Turn off part cooling fan
   

[gcode_macro LOAD_FILAMENT]
gcode:
    _CLOSE_PROMPT
    {% set extruder_temp = params.EXTRUDER_TEMP|default(250) %}

    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                         ; Home if necessary
    {% endif %}

    M104 S{extruder_temp}           ; Start heating the nozzle

    MOVE_TO_TRAY                    ; Move to the tray
    RESPOND TYPE=command MSG="action:prompt_begin Load Filament"
    RESPOND TYPE=command MSG="action:prompt_text Insert filament all the way into extruder before continuing"
    RESPOND TYPE=command MSG="action:prompt_footer_button LOAD|_LOAD_FILAMENT_STEP_PUSH"
    RESPOND TYPE=command MSG="action:prompt_footer_button CANCEL|RETURN"
    RESPOND TYPE=command MSG="action:prompt_show"

    M109 S{extruder_temp}           ; Wait for nozzle to reach temp
    M107                       ; Turn on part cooling fan (full speed)
    _LOAD_FILAMENT_STEP_PUSH        ; Push filament into extruder and wipe


# Cuts the tip of the filament and ejects it from the extruder

[gcode_macro CUT_FILAMENT]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                         ; Home if necessary
    {% endif %}

    G90
    G0 Y20 F8000
    G0 X255 F8000
    G0 Y4 F1200
    G0 Y20 F1200
    M400


[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                         ; Home if necessary
    {% endif %}
                      ; Absolute positioning
    CUT_FILAMENT                            ; Wait for movements to complete

    MOVE_TO_TRAY
    COLD_EXTRUDE HEATER=extruder ENABLE=1                    ; Move to the tray
    G1 E-30 F600
    COLD_EXTRUDE HEATER=extruder ENABLE=0
    G0 Y250
    M400                            ; Wait for movements to complete
[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BED_MESH_CALIBRATE_BASE
gcode:
    {% set svar = printer['gcode_macro _global_var'] %}
    {% set bed_temp = params.BED_TEMP|default(60)|float %}
    M140 S{bed_temp}
    G28
    CLEAN_NOZZLE
    M190 S{bed_temp}
    M104 S{svar.extruder_temp.probing}
    G4 S60000
    LOADCELL_Z_HOME
    M109 S{svar.extruder_temp.probing}
    ALL_FANS_OFF
    BED_MESH_CALIBRATE_BASE

[homing_override]
axes: xyz # This forces the z position to be at 0 when we start homing, so we can move the Z up before homing.
set_position_z: 0
gcode:
    BED_MESH_CLEAR
    G90
    G0 Z5 F1200 ; 5 up zhop
    {% if not rawparams %}
        G28 X
        G28 Y
        G28 X
        G0 X128 Y128 F4800
        G28 Z
    {% else %}
        {% if 'X' in rawparams %}
            G28 X
        {% endif %}
        {% if 'Y' in rawparams %}
            G28 Y
        {% endif %}
        {% if 'Z' in rawparams %}
            G28 Z
        {% endif %}
    {% endif %}

    {% if "default" in printer.bed_mesh.profiles %}
        BED_MESH_PROFILE LOAD=default
    {% endif %}
    

[gcode_macro _SHOW_PROMPT]
gcode:
    {% set title = params.TITLE|default('Please wait') %}
    {% set message = params.MESSAGE %}
    {% set esc_title = title|replace('"','\\"') %}
    {% set esc_message = message|replace('"','\\"') %}

    RESPOND TYPE=command MSG="action:prompt_begin {esc_title}"
    RESPOND TYPE=command MSG="action:prompt_text {esc_message}"
    RESPOND TYPE=command MSG="action:prompt_footer_button Dismiss|RESPOND TYPE=command MSG=action:prompt_end"

    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _CLOSE_PROMPT]
gcode:
  RESPOND TYPE=command MSG="action:prompt_end"

[gcode_macro SET_DISPLAY_TEXT]
rename_existing: SET_DISPLAY_TEXT_BASE
gcode:
    {% set message = params.MSG|default('') %}

    {% if message %}
        {action_respond_info(message)}
    {% endif %}

    SET_DISPLAY_TEXT_BASE MSG="{message}"

[gcode_macro SCREWS_TILT_CALCULATE]
rename_existing: SCREWS_TILT_CALCULATE_BASE
gcode:
    {% set svar = printer['gcode_macro _global_var'] %}
    {% set bed_temp = params.BED_TEMP|default(60)|int %}

    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                         ; Home if necessary
    {% endif %}
    
    BED_MESH_CLEAR
    M190 S{bed_temp}
    M109 S{svar.extruder_temp.probing}
    M400
    G28
    CLEAN_NOZZLE
    SCREWS_TILT_CALCULATE_BASE
[gcode_macro TEST]
gcode:
    {% set svar = printer['gcode_macro _global_var'] %}

    {% if svar.adaptive_purge %}
        SET_DISPLAY_TEXT MSG="purgeLINE_PURGE"
    {% endif %}

    {% if svar.adaptive_mesh %}
        SET_DISPLAY_TEXT MSG="meshSMART_PARK"
    {% endif %}

[gcode_macro M729]
gcode:
    SET_DISPLAY_TEXT MSG="USE COSMOS GCODE!"
    M112

[gcode_macro M8213]
gcode:
    SET_DISPLAY_TEXT MSG="USE COSMOS GCODE!"
    M112