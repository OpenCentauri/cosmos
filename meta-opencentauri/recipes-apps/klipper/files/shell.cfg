[gcode_shell_command START_DOOM]
command: play-doom
timeout: 9999999
verbose: False

[gcode_macro DOOM]
gcode:
    RUN_SHELL_COMMAND CMD=START_DOOM

[gcode_shell_command CAMERA_LIGHT_ON]
command: v4l2-ctl -d /dev/video0 --set-ctrl backlight_compensation=1
timeout: 5
verbose: False

[gcode_shell_command CAMERA_LIGHT_OFF]
command: v4l2-ctl -d /dev/video0 --set-ctrl backlight_compensation=0
timeout: 5
verbose: False

[gcode_macro VERIFY_CAMERA_LIGHT]
variable_last_state: 0
gcode:
  {% set current = printer["output_pin case_led"].value > 0 %}
  {% set last = printer["gcode_macro VERIFY_CAMERA_LIGHT"].last_state %}

  {% if current != last %}
    SET_GCODE_VARIABLE MACRO=VERIFY_CAMERA_LIGHT VARIABLE=last_state VALUE={current}
    {% if current %}
      RUN_SHELL_COMMAND CMD=CAMERA_LIGHT_ON
    {% else %}
      RUN_SHELL_COMMAND CMD=CAMERA_LIGHT_OFF
    {% endif %}
  {% endif %}

[delayed_gcode verify_camera_light_loop]
initial_duration: 2.0
gcode:
  {% settings = printer["gcode_macro _COSMOS_SETTINGS"]|default({}) %}
  {% sync = settings.sync_camera_led_to_chamber_led|default(false)|lower == 'true' %}

  {% if sync %}
    VERIFY_CAMERA_LIGHT
    UPDATE_DELAYED_GCODE ID=verify_camera_light_loop DURATION=2
  {% endif %}
