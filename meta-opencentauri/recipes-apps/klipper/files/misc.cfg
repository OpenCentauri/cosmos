[printer]
kinematics: corexy
max_velocity: 500.000000
max_accel: 20000.000000
max_z_velocity: 20.000000
max_z_accel: 500.000000
square_corner_velocity: 9.000000

[gcode_arcs]
resolution: 0.5

[pause_resume]

[exclude_object]

[input_shaper]
damping_ratio_x: 0.06
damping_ratio_y: 0.082

[resonance_tester]
probe_points: 128,128,5
accel_chip: lis2dw
min_freq: 5.000000
max_freq: 75.000000
accel_per_hz: 100.000000
hz_per_sec: 1.000000

[screws_tilt_adjust]
screw1: 28.5, 28.5
screw1_name: front left screw
screw2: 228.5, 28.5
screw2_name: front right screw
screw3: 228.5, 228.5
screw3_name: rear right screw
screw4: 28.5, 228.5
screw4_name: rear left screw
horizontal_move_z: 5
speed: 350
screw_thread: CW-M3