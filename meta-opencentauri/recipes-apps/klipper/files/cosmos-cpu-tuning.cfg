# -----
# PLEASE DO NOT EDIT THIS FILE. EDIT printer.cfg INSTEAD.
# EDITING THIS FILE WILL EXCLUDE YOUR CHANGES FROM FUTURE UPDATES.
# -----
#
# Optional: pin the Allwinner R528 cpufreq governor to "performance" during
# prints and restore the default governor at print end. R528 is a quad-core
# Cortex-A7 around 1.2 GHz; the default schedutil governor clocks down
# between move-queue ticks which can introduce micro-stutter at high accel
# and step rate. Performance governor holds the cores at max freq
# throughout the print so motion planning and step scheduling stay tight.
#
# Governor changes are sysfs writes and fail closed: if /sys/devices/system/
# cpu/* is unwritable, the helper logs and continues; the print proceeds
# without the optimization.
#
# PRINT_END (or CANCEL_PRINT) restores "schedutil", which is the cosmos
# default on 6.6.x. Override the restore target by editing the
# _CPU_GOVERNOR_RESTORE macro below.

[gcode_macro _CPU_GOVERNOR_PERFORMANCE]
gcode:
    RUN_SHELL_COMMAND CMD=cpu_governor_set PARAMS=performance

[gcode_macro _CPU_GOVERNOR_RESTORE]
gcode:
    RUN_SHELL_COMMAND CMD=cpu_governor_set PARAMS=schedutil

# Wrap existing PRINT_START / add PRINT_END. macros.cfg defines a minimal
# PRINT_START that only forwards EXTRUDER_TEMP to _GLOBAL_VARS; extend
# via rename_existing so future macros.cfg PRINT_START edits compose.

[gcode_macro PRINT_START_CPU_GOVERNOR_HOOK]
gcode:
    _CPU_GOVERNOR_PERFORMANCE

[gcode_macro PRINT_END_CPU_GOVERNOR_HOOK]
gcode:
    _CPU_GOVERNOR_RESTORE
