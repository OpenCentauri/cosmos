########################################################################################################################
# Happy Hare MMU - Centauri Carbon 1 Integration
#
# Combines MMU load/unload with Centauri's cutter and wiper
#
# SETUP:
# 1. Include this file in printer.cfg: [include mmu/addons/mmu_centauri.cfg]
# 2. In mmu_parameters.cfg set:
#    form_tip_macro: _MMU_CUT_TIP  (already set - this file overrides the default)
#    force_form_tip_standalone: 1
# 3. In mmu_macro_vars.cfg set:
#    variable_user_post_load_extension: _MMU_CENTAURI_POST_LOAD
#    variable_user_pre_unload_extension: _MMU_CENTAURI_PRE_UNLOAD
#
########################################################################################################################

# ============================================================================
# CUT TIP - Uses Centauri's cutter at X255, Y3
# Overrides Happy Hare's default _MMU_CUT_TIP
# ============================================================================
[gcode_macro _MMU_CUT_TIP_VARS]
description: Variables for Centauri cutter integration
gcode: # Leave empty - this is a variable storage macro
# Cutter position (from original UNLOAD_FILAMENT)
variable_pin_loc_xy: (255, 3)          ; X255, Y3 - cutting position
variable_cutting_axis: "y"             ; Cut by moving Y
variable_pin_park_dist: 30             ; Distance to park before cut (Y30)
variable_pin_loc_compressed: 3         ; Y position when cutter is engaged
variable_retract_length: 15            ; Retract before cut
variable_blade_pos: 37.5               ; Distance from nozzle to blade
variable_rip_length: 1.0               ; Retract after cut
variable_pushback_length: 0            ; No pushback (filament is ejected)
variable_travel_speed: 150             ; mm/s
variable_cut_fast_move_speed: 32       ; mm/s
variable_cut_slow_move_speed: 8        ; mm/s
variable_extruder_move_speed: 25       ; mm/s
variable_simple_tip_forming: False     ; No tip forming - we cut!
variable_restore_position: False       ; Don't restore position (MMU handles it)
variable_gantry_servo_enabled: False   ; No gantry servo
# CRITICAL: Z-hop for bed-moving printers (Centauri CoreXY)
# This is RELATIVE to current Z - bed will move DOWN when Z increases
variable_z_hop_clearance: 15           ; mm to ADD to current Z for clearance (bed moves DOWN)
# Post-load clearance position (move away from tray to prevent blobs)
variable_post_load_retract: 2          ; mm retract after purge to prevent ooze
variable_clearance_y: 250              ; Y position to move away from tray (264.5 -> 250)

[gcode_macro _MMU_CUT_TIP]
description: Cut filament using Centauri's cutter mechanism (overrides Happy Hare default)
variable_output_park_pos: 0

gcode:
    {% set final_eject = params.FINAL_EJECT|default(0)|int %}
    {% set vars = printer['gcode_macro _MMU_CUT_TIP_VARS'] %}
    {% set z_hop = vars.z_hop_clearance|default(15)|float %}
    {% set current_z = printer.gcode_move.gcode_position.z %}
    {% set safe_z = current_z + z_hop %}

    MMU_LOG MSG="Centauri Cutter: Starting cut sequence"

    # Ensure XYZ homed (from original UNLOAD_FILAMENT)
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    SAVE_GCODE_STATE NAME=_MMU_CUT_TIP_state
    G90                             ; Absolute positioning
    M83                             ; Relative extrusion
    G92 E0

    # Step 1: Retract filament before cut (if needed)
    {% set retract_length = 15 %}
    {% set effective_retract = retract_length - printer.mmu.extruder_filament_remaining|default(0)|float %}
    {% if effective_retract > 0 %}
        MMU_LOG MSG="Retracting {effective_retract|round(1)}mm before cut"
        G1 E-{effective_retract} F1500
    {% endif %}

    # Step 2: Move to cutting position with RELATIVE Z-hop (bed moves DOWN)
    # CRITICAL: For bed-moving Z printers, increasing Z moves bed DOWN (clearance)
    MMU_LOG MSG="Z-hop: current Z={current_z|round(1)}, safe Z={safe_z|round(1)} (bed moves DOWN {z_hop}mm)"
    G0 Z{safe_z} F600               ; Move bed DOWN for clearance
    G0 Y30 F15000                   ; Get some clearance for Y
    G0 X255 F8000                   ; Move to cutting position

    # Step 3: Perform the cut (from original UNLOAD_FILAMENT)
    G0 Y3 F1200                     ; Cut
    G0 Y30 F8000                    ; Retract from cutting
    M400                            ; Wait for movements to complete

    # Step 4: Move to tray so cut piece falls into chute
    MOVE_TO_TRAY                    ; Move to the tray
    M400                            ; Wait for movements to complete

    # Set park position for MMU (filament is at blade position from nozzle)
    # MMU will handle eject with Gear Motor - Encoder will sense the movement
    SET_GCODE_VARIABLE MACRO=_MMU_CUT_TIP VARIABLE=output_park_pos VALUE=37.5

    MMU_LOG MSG="Centauri Cutter: Cut complete, at tray position, park_pos=37.5mm"

    _MMU_EVENT EVENT="filament_cut"


# ============================================================================
# PRE LOAD - Move to chute BEFORE MMU inserts filament
# ============================================================================
[gcode_macro _MMU_CENTAURI_PRE_LOAD]
description: Move to chute before MMU loads filament
gcode:
    MMU_LOG MSG="Centauri: Pre-load - moving to chute first"

    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28 X Y
    {% endif %}

    # Move to tray/chute FIRST (before filament insert)
    G90                             ; Absolute positioning
    G0 Y250 F12000                  ; Move Y near tray first
    G0 X202 F12000                  ; Move X to tray position
    G0 Y264.5 F1200                 ; Move slowly to tray position
    M400                            ; Wait for moves

    MMU_LOG MSG="Centauri: Pre-load complete - at chute, ready for filament"


# ============================================================================
# POST LOAD - Purge and wipe AFTER MMU delivers filament (chute already positioned)
# ============================================================================
[gcode_macro _MMU_CENTAURI_POST_LOAD_VARS]
description: Variables for post-load sequence
gcode: # Leave empty
variable_post_load_retract: 2.0          ; mm to retract after purge/wipe to prevent ooze
variable_post_load_clearance_y: 240      ; Y position to move away from tray (prevent blobs)
variable_post_load_clearance_x: 128      ; X position after post-load (center-ish)
variable_post_load_travel_speed: 12000   ; mm/min travel speed

[gcode_macro _MMU_CENTAURI_POST_LOAD]
description: Purge and wipe after MMU delivers filament (uses LOAD_FILAMENT logic)
gcode:
    {% set vars = printer['gcode_macro _MMU_CENTAURI_POST_LOAD_VARS'] %}
    {% set extruder_temp = printer['gcode_macro _MMU_SEQUENCE_VARS'].extruder_temp|default(220)|float %}
    {% set purge_length = params.LENGTH|default(50)|float %}
    {% set retract = vars.post_load_retract|default(2.0)|float %}
    {% set clearance_y = vars.post_load_clearance_y|default(240)|float %}
    {% set clearance_x = vars.post_load_clearance_x|default(128)|float %}
    {% set travel_speed = vars.post_load_travel_speed|default(12000)|int %}

    MMU_LOG MSG="Centauri: Post-load - purging and wiping"

    # Ensure temperature
    {% if printer[printer.toolhead.extruder].temperature < extruder_temp - 10 %}
        M109 S{extruder_temp}
    {% endif %}

    # Turn on part cooling fan to prevent blobbing (same as LOAD_FILAMENT)
    M106 S255                       ; Turn on part cooling fan (full speed)
    SET_FAN_SPEED FAN=model_helper_fan SPEED=1 ; Turn on auxiliary fan (full speed)

    # Use existing LOAD_FILAMENT purge/wipe logic (SILENT=1 suppresses prompt)
    _LOAD_FILAMENT_STEP_PUSH SILENT=1 LENGTH={purge_length}

    # Turn off fans after purge/wipe
    M106 S0                         ; Turn off part cooling fan
    SET_FAN_SPEED FAN=model_helper_fan SPEED=0 ; Turn off auxiliary fan

    # CRITICAL: Retract and move AWAY from tray to prevent blobs/hanging
    {% if retract > 0 %}
        MMU_LOG MSG="Retracting {retract}mm to prevent ooze"
        G1 E-{retract} F1800       ; Quick retract
    {% endif %}

    # Move away from tray to clearance position
    MMU_LOG MSG="Moving to clearance position (X:{clearance_x}, Y:{clearance_y})"
    G90                             ; Absolute positioning
    G0 Y{clearance_y} F{travel_speed}  ; Move Y away from tray first
    G0 X{clearance_x} F{travel_speed}  ; Move X to center position
    M400                            ; Wait for movements

    MMU_LOG MSG="Centauri: Post-load complete - clear of tray"


# ============================================================================
# PRE UNLOAD - Position for cutting before MMU unload
# ============================================================================
[gcode_macro _MMU_CENTAURI_PRE_UNLOAD]
description: Prepare for unload by positioning for cut
gcode:
    {% set vars = printer['gcode_macro _MMU_CUT_TIP_VARS'] %}
    {% set z_hop = vars.z_hop_clearance|default(15)|float %}
    {% set current_z = printer.gcode_move.gcode_position.z %}
    {% set safe_z = current_z + z_hop %}

    MMU_LOG MSG="Centauri: Pre-unload - preparing cutter position"

    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28 X Y
    {% endif %}

    # Z clearance for cutting - RELATIVE Z-hop (bed moves DOWN)
    # CRITICAL: For bed-moving Z printers, increasing Z moves bed DOWN (clearance)
    MMU_LOG MSG="Z-hop: current Z={current_z|round(1)}, safe Z={safe_z|round(1)} (bed moves DOWN {z_hop}mm)"
    G0 Z{safe_z} F600

    MMU_LOG MSG="Centauri: Pre-unload ready"


# ============================================================================
# WIPE ONLY - For manual wipe without load
# ============================================================================
[gcode_macro MMU_WIPE_NOZZLE]
description: Wipe nozzle using Centauri's wiper
gcode:
    M729


# ============================================================================
# PURGE - Purge filament at tray position
# ============================================================================
[gcode_macro _MMU_PURGE_CENTAURI]
description: Purge filament at tray position
gcode:
    {% set purge_length = params.LENGTH|default(50)|float %}
    {% set extruder_temp = params.TEMP|default(220)|float %}
    
    # Move to tray
    G0 X202 F6000
    G0 Y264.5 F1200
    
    # Heat if needed
    {% if printer[printer.toolhead.extruder].temperature < extruder_temp - 10 %}
        M109 S{extruder_temp}
    {% endif %}
    
    # Purge
    M83
    G92 E0
    G1 E{purge_length} F240
    
    # Wipe
    M729