# Elegoo E400 Lite — Klipper configuration
#
# Copy this into your printer.cfg or use:  [include elegoo_e400.cfg]
#
# =====================================================================
# CONNECTION NOTES
#
# The E400 Lite has TWO serial interfaces:
#
#   1. USART2 (Modbus RTU) — the proper control protocol.
#      This is the connector that normally goes to the Elegoo printer.
#      To use with Klipper, wire a USB-to-UART adapter (FTDI/CH340/CP2102)
#      to the USART2 TX/RX pins on the E400 PCB or its printer connector.
#      Use mode: modbus (recommended).
#
#   2. USB CDC (debug CLI) — the STM32's own USB port (VID 0483:5740).
#      Appears as /dev/ttyACMx when plugged in.  Provides a limited
#      debug console with feed_cmd / unload_cmd commands.
#      Use mode: cli (fallback if you only have the USB cable).
#
# Find your serial port:
#   ls /dev/serial/by-id/
#   ls /dev/ttyACM* /dev/ttyUSB*
# =====================================================================

[elegoo_e400]
serial: /dev/serial/by-id/REPLACE_ME
#   Serial device path.  Use /dev/serial/by-id/... for a stable name.

mode: modbus
#   'modbus' — Modbus RTU over UART (recommended, full control)
#   'cli'    — USB CDC debug CLI (limited, fallback only)

#baud: 115200
#   Baud rate.  115200 for Modbus.  Ignored for USB CDC but harmless.

#slave_address: 2
#   Modbus slave address.  The E400 Lite defaults to 2.

#serial_timeout: 0.5
#   Seconds to wait for a Modbus response frame.

#retries: 2
#   Modbus transaction retry count on CRC/timeout errors.

#load_timeout: 45
#   Max seconds to wait for a filament load operation.

#unload_timeout: 45
#   Max seconds to wait for a filament unload operation.

#poll_interval: 0.5
#   Seconds between state polls during load/unload.

#min_operation_wait: 3.0
#   Minimum seconds to wait before polling for completion.

#cli_command_wait: 15
#   Fixed wait (seconds) after a CLI command (cli mode only).


# =====================================================================
# TOOL CHANGE MACRO
#
# Adjust the variables below for your physical setup.
# The macro handles: tip forming, bowden retract, E400 switch,
# bowden feed, purge, and position restore.
#
# Set bowden_length to the distance (mm) from the E400 output port
# to your extruder gears.  Leave at 0 to skip bowden moves (if the
# E400 output connects directly to your extruder or you handle it
# elsewhere).
# =====================================================================

[gcode_macro _EL_CANVAS_CC_TOOLCHANGE]
description: Internal: Elegoo E400 filament change sequence
variable_active_tool: -1
# Distance from E400 output to extruder gears (mm).  0 = skip.
variable_bowden_length: 0
# Tip-forming retraction distance (mm)
variable_tip_retract: 2.0
# Extra purge after loading new filament (mm)
variable_purge_length: 30
# Speeds (mm/s)
variable_retract_speed: 30
variable_bowden_speed: 60
variable_purge_speed: 3
# Park position for tool changes.  Both must be >= 0 to enable.
variable_park_x: -1
variable_park_y: -1
variable_park_speed: 150
gcode:
    {% set new = params.T | int %}
    {% set cur = printer["gcode_macro _EL_CANVAS_CC_TOOLCHANGE"].active_tool | int %}

    {% if cur != new %}
        {% set bowden  = printer["gcode_macro _EL_CANVAS_CC_TOOLCHANGE"].bowden_length | float %}
        {% set tip     = printer["gcode_macro _EL_CANVAS_CC_TOOLCHANGE"].tip_retract | float %}
        {% set purge   = printer["gcode_macro _EL_CANVAS_CC_TOOLCHANGE"].purge_length | float %}
        {% set ret_spd = (printer["gcode_macro _EL_CANVAS_CC_TOOLCHANGE"].retract_speed | float * 60) | int %}
        {% set bow_spd = (printer["gcode_macro _EL_CANVAS_CC_TOOLCHANGE"].bowden_speed | float * 60) | int %}
        {% set pur_spd = (printer["gcode_macro _EL_CANVAS_CC_TOOLCHANGE"].purge_speed | float * 60) | int %}
        {% set pk_x    = printer["gcode_macro _EL_CANVAS_CC_TOOLCHANGE"].park_x | float %}
        {% set pk_y    = printer["gcode_macro _EL_CANVAS_CC_TOOLCHANGE"].park_y | float %}
        {% set pk_spd  = (printer["gcode_macro _EL_CANVAS_CC_TOOLCHANGE"].park_speed | float * 60) | int %}

        SAVE_GCODE_STATE NAME=e400_tc

        ; --- park (optional) ---
        {% if pk_x >= 0 and pk_y >= 0 %}
            G90
            G1 X{pk_x} Y{pk_y} F{pk_spd}
        {% endif %}

        ; --- unload current filament ---
        {% if cur >= 0 %}
            {% if printer.extruder is defined %}
                ; tip forming: retract, partial push, longer retract
                M83
                G1 E-{tip}          F{ret_spd}
                G1 E{tip * 0.5}     F{ret_spd}
                G1 E-{tip * 1.5}    F{ret_spd}

                ; pull filament out of bowden tube
                {% if bowden > 0 %}
                    G1 E-{bowden}   F{bow_spd}
                {% endif %}
            {% endif %}

            ; E400: retract filament back into spool slot
            EL_CANVAS_CC_UNLOAD CHANNEL={cur}
        {% endif %}

        ; --- load new filament ---
        EL_CANVAS_CC_SELECT CHANNEL={new}
        EL_CANVAS_CC_LOAD CHANNEL={new}

        {% if printer.extruder is defined %}
            ; push filament through bowden tube to hotend
            {% if bowden > 0 %}
                M83
                G1 E{bowden}        F{bow_spd}
            {% endif %}

            ; purge to clear old material
            {% if purge > 0 %}
                M83
                G1 E{purge}         F{pur_spd}
            {% endif %}

            ; small retract to reduce ooze
            M83
            G1 E-{tip}              F{ret_spd}
        {% endif %}

        RESTORE_GCODE_STATE NAME=e400_tc MOVE=1 MOVE_SPEED={pk_spd / 60}

        SET_GCODE_VARIABLE MACRO=_EL_CANVAS_CC_TOOLCHANGE VARIABLE=active_tool VALUE={new}
    {% endif %}


# =====================================================================
# T0 – T3 MACROS
#
# These are called by the slicer (or manually) to switch filament.
# =====================================================================

[gcode_macro T0]
description: Select filament channel 0
gcode:
    _EL_CANVAS_CC_TOOLCHANGE T=0

[gcode_macro T1]
description: Select filament channel 1
gcode:
    _EL_CANVAS_CC_TOOLCHANGE T=1

[gcode_macro T2]
description: Select filament channel 2
gcode:
    _EL_CANVAS_CC_TOOLCHANGE T=2

[gcode_macro T3]
description: Select filament channel 3
gcode:
    _EL_CANVAS_CC_TOOLCHANGE T=3


# =====================================================================
# UNLOAD SPOOL
#
# Unloads a specific channel, or the active one if none is specified.
# Handles tip forming & bowden retract when an extruder is present.
#
#   EL_CANVAS_CC_UNLOAD_SPOOL              — unload active spool
#   EL_CANVAS_CC_UNLOAD_SPOOL CHANNEL=2    — unload channel 2
# =====================================================================

[gcode_macro EL_CANVAS_CC_UNLOAD_SPOOL]
description: Unload active spool (or a specific CHANNEL=0-3)
gcode:
    {% set tc = printer["gcode_macro _EL_CANVAS_CC_TOOLCHANGE"] %}
    {% set cur = tc.active_tool | int %}
    {% set ch = params.CHANNEL | default(-1) | int %}

    ; default to active tool if no channel given
    {% if ch < 0 %}
        {% set ch = cur %}
    {% endif %}

    {% if ch < 0 or ch > 3 %}
        { action_raise_error("EL_CANVAS_CC_UNLOAD_SPOOL: no active tool and no CHANNEL specified") }
    {% endif %}

    {% set bowden  = tc.bowden_length | float %}
    {% set tip     = tc.tip_retract | float %}
    {% set ret_spd = (tc.retract_speed | float * 60) | int %}
    {% set bow_spd = (tc.bowden_speed | float * 60) | int %}

    SAVE_GCODE_STATE NAME=e400_unload

    {% if printer.extruder is defined %}
        ; tip forming
        M83
        G1 E-{tip}       F{ret_spd}
        G1 E{tip * 0.5}  F{ret_spd}
        G1 E-{tip * 1.5} F{ret_spd}

        ; pull filament out of bowden
        {% if bowden > 0 %}
            G1 E-{bowden} F{bow_spd}
        {% endif %}
    {% endif %}

    ; E400: retract filament back into spool slot
    EL_CANVAS_CC_UNLOAD CHANNEL={ch}

    ; clear active tool if we just unloaded it
    {% if ch == cur %}
        SET_GCODE_VARIABLE MACRO=_EL_CANVAS_CC_TOOLCHANGE VARIABLE=active_tool VALUE=-1
    {% endif %}

    RESTORE_GCODE_STATE NAME=e400_unload


# =====================================================================
# OPTIONAL: set the initial tool at print start so the first T command
# knows whether an unload is needed.  Call from your START_PRINT macro:
#
#   EL_CANVAS_CC_INIT_TOOL T=0
# =====================================================================

[gcode_macro EL_CANVAS_CC_INIT_TOOL]
description: Set the initial tool without performing a full change
gcode:
    {% set t = params.T | default(0) | int %}
    SET_GCODE_VARIABLE MACRO=_EL_CANVAS_CC_TOOLCHANGE VARIABLE=active_tool VALUE={t}
    EL_CANVAS_CC_SELECT CHANNEL={t}
    EL_CANVAS_CC_LOAD CHANNEL={t}
