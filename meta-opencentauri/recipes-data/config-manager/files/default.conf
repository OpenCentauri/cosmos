[ui]
# User interface used on the built in screen.
screen_ui = grumpyscreen
# User interface used for the webui.
web_ui = mainsail
# Brightness of the built in screen.
screen_brightness = 100

[update]
# Update channel used by the COSMOS updater.
release = stable

[klipper]
# Keep the camera LED state in sync with the chamber LED.
sync_camera_led_to_chamber_led = False
# Turn the camera LED on automatically when Klipper starts.
camera_led_default_on = True
# Allow printing before the initial calibration checks have passed.
bypass_calibration = False
# Minutes to wait after the bed reaches temperature before starting a print.
heatsoak = 1
# Probe only the print area for each print instead of loading the default bed mesh. Requires nozzle_z_homing to be enabled.
adaptive_mesh = False
# Prime the nozzle near the print area before each print.
adaptive_purge = True
# Use the nozzle and load cell probe for Z homing.
nozzle_z_homing = False
# Drop the bed to this height in millimeters when a print finishes.
z_ideal_lifting_distance = 170
# Hotend temperature in Celsius used during the full calibration workflow.
full_calibrate_hotend_temperature = 250
# Bed temperature in Celsius used during the full calibration workflow.
full_calibrate_bed_temperature = 60
