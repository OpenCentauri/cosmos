[include afc.cfg]

[mcu canvas]
serial: /dev/serial/by-path/platform-4200000.usb-usb-0:1.4:1.0
restart_method: command

[drv8833 canvas_lane0]
motor_fwd: canvas:PA6
motor_rwd: canvas:PA5
motor_cycle_time: 0.0001
motor_hall: canvas:PB6
motor_hall_resolution: 0.27335

[drv8833 canvas_lane1]
motor_fwd: canvas:PA7
motor_rwd: canvas:PB0
motor_cycle_time: 0.0001
motor_hall: canvas:PB7
motor_hall_resolution: 0.27335

[drv8833 canvas_lane2]
motor_fwd: canvas:PB8
motor_rwd: canvas:PB9
motor_cycle_time: 0.0001
motor_hall: canvas:PB5
motor_hall_resolution: 0.27335

[drv8833 canvas_lane3]
motor_fwd: canvas:PB1
motor_rwd: canvas:PB10
motor_cycle_time: 0.0001
motor_hall: canvas:PB4
motor_hall_resolution: 0.27335

[board_pins canvas]
mcu: canvas
aliases:
    ENABLE_9V=PC2     , ENABLE_24V=PC3,

    MOTOR0_FWD=PA6    , MOTOR0_RWD=PA5,
    MOTOR1_FWD=PB0    , MOTOR1_RWD=PA7,
    MOTOR2_FWD=PB8    , MOTOR2_RWD=PB9,
    MOTOR3_FWD=PB10   , MOTOR3_RWD=PB1,

    HALL0=PB6         , HALL1=PB7,
    HALL2=PB5         , HALL3=PB4,

    LED0_WHITE=PC9    , LED0_RED=PC8,
    LED1_WHITE=PC6    , LED1_RED=PB15,
    LED2_WHITE=PC10   , LED2_RED=PA15,
    LED3_WHITE=PC1    , LED3_RED=PC12,

    FILAMENT0=PA8     , FILAMENT1=PC7,
    FILAMENT2=PC11    , FILAMENT3=PC0,

    ODOMETER0=PA2     , ODOMETER1=PA3,
    ODOMETER2=PA1     , ODOMETER3=PA0

[AFC_hub toolhead_4way_hub]
switch_pin: !hotend:PB2
enable_hub_runout: False

[AFC_extruder extruder]
pin_tool_start: !hotend:PB2
tool_stn: 94
tool_stn_unload: 31
tool_sensor_after_extruder: 0
tool_unload_speed: 15
tool_load_speed: 8

[AFC_canvas CANVAS_1]
extruder: extruder
enable_9v_pin: canvas:ENABLE_9V
enable_24v_pin: canvas:ENABLE_24V
tangle_pin: !hotend:PB0
short_moves_speed: 30
long_moves_speed: 70
tool_unload_lane_extra_speed: 40 # Unused
prep_distance: 120
prep_speed: 60
tool_load_sync_speed_offset: 2
tool_load_lane_extra_distance: 6.5
tool_unload_lane_extra_distance: 40 # Unused

[AFC_canvas_lane canvas_lane0]
unit: CANVAS_1:1
hub: toolhead_4way_hub
map: T0
dist_hub: 1200
prep: !canvas:FILAMENT0
drv8833: canvas_lane0
odometer_pin: canvas:ODOMETER0
odometer_resolution: 3.15786
led_white_pin: canvas:LED0_WHITE
led_red_pin: canvas:LED0_RED

[AFC_canvas_lane canvas_lane1]
unit: CANVAS_1:2
hub: toolhead_4way_hub
map: T1
dist_hub: 1200
prep: !canvas:FILAMENT1
drv8833: canvas_lane1
odometer_pin: canvas:ODOMETER1
odometer_resolution: 3.15786
led_white_pin: canvas:LED1_WHITE
led_red_pin: canvas:LED1_RED

[AFC_canvas_lane canvas_lane2]
unit: CANVAS_1:3
hub: toolhead_4way_hub
map: T2
dist_hub: 1200
prep: !canvas:FILAMENT2
drv8833: canvas_lane2
odometer_pin: canvas:ODOMETER2
odometer_resolution: 3.15786
led_white_pin: canvas:LED2_WHITE
led_red_pin: canvas:LED2_RED

[AFC_canvas_lane canvas_lane3]
unit: CANVAS_1:4
hub: toolhead_4way_hub
map: T3
dist_hub: 1200
prep: !canvas:FILAMENT3
drv8833: canvas_lane3
odometer_pin: canvas:ODOMETER3
odometer_resolution: 3.15786
led_white_pin: canvas:LED3_WHITE
led_red_pin: canvas:LED3_RED

[gcode_macro CUT]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                         ; Home if necessary
    {% endif %}

    G90                             ; Absolute positioning
    G0 Z14.5 F600                   ; Ensure we have some Z clearance
    G0 Y30 F15000                    ; Get some clearance for Y
    G0 X255 F8000                  ; Move to cutting position
    G0 Y3 F1200                     ; Cut
    G0 Y30 F8000                   ; Retract from cutting
    M400                            ; Wait for movements to complete

[gcode_macro POOP]
gcode:
  {% if params.PURGE_LENGTH %}
    M83
    G1 E{params.PURGE_LENGTH} F600
  {% endif %}

# Wipe Nozzle, from new firmware printer.cfg
[gcode_macro M729]
gcode:
    SAVE_GCODE_STATE NAME=m729_saved_state

    G90              ; Absolute positioning
    
    ; === Approach ===
    G1 X202 F6000    ; Move to wiper X start position
    G1 Y264.5 F6000  ; Move to wiper Y position (top of wiper)
    
    ; === Pass 1: X sweeps at top of wiper ===
    G1 X165 F8000    ; Wipe left  (165 vs 170 in old — 5mm wider sweep)
    G1 X190          ; Wipe right
    G1 X165          ; Wipe left
    
    ; === Full depth plunge ===
    G1 Y245 F6000    ; Drop to full depth (19.5mm below top — 5mm deeper than old)
    
    ; === Full width sweep at depth ===
    G1 X202 F7200    ; Full width sweep right across entire wiper
    
    ; === Extract ===
    G1 Y264.5 F1200  ; Slow lift up through wiper (clean exit)
    
    M400             ; Wait for all moves to complete

    RESTORE_GCODE_STATE NAME=m729_saved_state

[AFC]
VarFile: /etc/klipper/config/AFC.var
enable_sensors_in_gui: True
ignore_spoolman_material_temps: False  
load_to_hub: False
moonraker_port: 80
debug: True
z_hop: 5
resume_speed: 120
resume_z_speed: 25
led_fault: 1,0,0,0              #    Fault color
led_ready: 0,0,0,1              #    Ready color
led_not_ready: 1,0,0,0          #    Not ready color
led_loading: 1,0,0,1            #    Loading color
led_tool_loaded: 1,0,0,1        #    Loaded color
led_buffer_advancing: 0,0,1,0   #    Buffer advancing color
led_buffer_trailing: 0,1,0,0    #    Buffer trailing color
led_buffer_disable: 0,0,0,0.25  #    Buffer disable color
led_spool_illuminate: 1,1,1,0   #    Loading color to illuminate spool, currently only for QuattroBox units and can be overridden in AFC_QuattroBox section
unload_on_runout: False
auto_home: True
enable_assist: False
spool_ratio: 2
enable_hub_runout: False
enable_tool_runout: True
homing_enabled: False

# TOOL Cutting Settings
tool_cut: True                  
tool_cut_cmd: CUT
tool_cut_threshold: 10000

# Park Settings
park: True
park_cmd: MOVE_TO_TRAY

# Poop Settings
poop: True                      
poop_cmd: POOP              

# Kick Settings
kick: False

# Wipe Settings
wipe: True                      
wipe_cmd: M729

# Form Tip Settings
form_tip: False