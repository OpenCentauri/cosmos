worker_processes 1;
error_log /dev/stderr info;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream moonraker {
        server 192.168.178.117:80;
    }

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Mainsail frontend
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Moonraker WebSocket
        location /websocket {
            proxy_pass http://moonraker/websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # Moonraker API
        location ~ ^/(printer|api|machine|server|access) {
            proxy_pass http://moonraker;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Webcam stream
        location /webcam/ {
            proxy_pass http://moonraker/webcam/;
        }

        # Webcam snapshot
        location /webcam {
            proxy_pass http://moonraker/webcam?action=stream;
        }
    }
}
